<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Heroes: 5 класс</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* --- ЦВЕТОВАЯ ГАММА И ШРИФТЫ --- */
        :root {
            --sky-blue: #87CEEB;
            --lime: #32CD32;
            --orange: #FF8C00;
            --white: #FFFFFF;
            --dark-text: #003366;
        }

        body { 
            font-family: 'Nunito', sans-serif; 
            margin: 0; padding: 20px; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
            background: linear-gradient(180deg, var(--sky-blue) 0%, #E0F7FA 100%);
            color: var(--dark-text);
            font-size: 18px;
        }

        /* Карточки приложения */
        .card { 
            background: var(--white); 
            padding: 25px; border-radius: 35px; 
            box-shadow: 0 10px 0 rgba(0,0,0,0.1); 
            width: 100%; max-width: 420px; text-align: center; 
            position: relative; z-index: 10; 
            display: none; border: 4px solid var(--dark-text);
            max-height: 85vh; overflow-y: auto;
        }

        .active { display: block; animation: bounceIn 0.5s ease; }

        @keyframes bounceIn {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Кнопки */
        button { 
            font-family: 'Nunito', sans-serif;
            border: none; padding: 20px; border-radius: 20px; 
            width: 100%; margin: 10px 0; 
            font-weight: 900; font-size: 20px; cursor: pointer; 
            transition: transform 0.1s, box-shadow 0.1s;
            box-shadow: 0 6px 0 rgba(0,0,0,0.2);
        }
        button:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }

        .btn-theory { background: var(--orange); color: white; }
        .btn-practice { background: var(--lime); color: white; }
        .btn-block { background: #f0faff; color: var(--dark-text); border: 3px solid var(--sky-blue); font-size: 18px; }
        .btn-back { background: #6c757d; color: white; font-size: 16px; padding: 12px; }

        /* Помощники */
        .helper-icon { font-size: 70px; margin-bottom: 10px; }

        /* Текст теории */
        .theory-box {
            text-align: left; background: #FFFDE7; padding: 20px; 
            border-radius: 25px; border: 3px dashed var(--orange);
            font-size: 18px; line-height: 1.5;
        }

        /* Декор фона */
        #floating-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .floater { position: absolute; bottom: -100px; opacity: 0.5; animation: floatUp linear forwards; }
        @keyframes floatUp {
            from { transform: translateY(0) rotate(0deg); }
            to { transform: translateY(-120vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="floating-container"></div>

    <div id="main-menu" class="card active">
        <div class="helper-icon">🐱🚀</div>
        <h2 style="font-size: 24px; margin-bottom: 10px;">Привет, Космо-герой!</h2>
        <p>Я Кот-космонавт. Полетели покорять математику?</p>
        <button class="btn-theory" onclick="showTheoryMenu()">📖 Секреты знаний</button>
        <button class="btn-practice" onclick="startPractice()">📝 Испытание</button>
    </div>

    <div id="theory-menu" class="card">
        <div class="helper-icon">🐶🔍</div>
        <h3 style="margin-bottom: 15px;">Выбери тему для изучения:</h3>
        <div id="theory-buttons"></div>
        <button class="btn-back" onclick="showMainMenu()">⬅️ Назад</button>
    </div>

    <div id="theory-view" class="card">
        <h3 id="theory-title" style="color: var(--orange); font-size: 22px;"></h3>
        <div id="theory-text" class="theory-box"></div>
        <button class="btn-theory" style="margin-top: 20px;" onclick="showTheoryMenu()">🚀 Понятно, дальше!</button>
    </div>

    <div id="quiz-screen" class="card">
        <div id="q-progress" style="font-weight: 900; font-size: 16px; margin-bottom: 10px; color: var(--orange);"></div>
        <h2 id="q-text" style="font-size: 20px; margin-bottom: 20px;"></h2>
        <div id="options"></div>
        <div id="solution-box" style="display:none; background:#f1f8e9; padding:20px; border-radius:25px; margin-top:15px; text-align:left; border: 3px solid var(--lime);">
            <b style="font-size: 20px;">🤖 Разбор от Кота:</b><br>
            <span id="solution-text" style="font-size: 18px;"></span>
        </div>
        <button id="next-btn" class="btn-practice" style="display:none;">К новой цели! 🚀</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Данные 5 класса (Теория по частям + Практика)
        const gradeData = {
            "5": {
                theoryBlocks: [
                    { title: "1. Натуральные числа", text: "<b>Свойства нуля:</b><br>• a + 0 = a (нейтральность)<br>• a * 0 = 0 (умножение на ноль)<br><br><b>Метод Гаусса:</b> Чтобы сложить числа от 1 до n, умножь последнее число на следующее за ним и подели на 2!<br><i>Пример: 1+2+3+4 = (4 * 5) / 2 = 10.</i>" },
                    { title: "2. Умножение и уравнения", text: "<b>Метод «Фонтанчика»:</b> a * (b + c) = a*b + a*c. Умножаем число на каждого в скобках!<br><br><b>Степень:</b><br>• a² (квадрат) = a * a<br>• a³ (куб) = a * a * a<br><br><b>Уравнения:</b> Чтобы найти слагаемое, из суммы (результата) вычти известное число." },
                    { title: "3. Геометрия", text: "<b>Периметр (P):</b> Сумма всех сторон. P = 2 * (длина + ширина).<br><br><b>Площадь (S):</b> S = длина * ширина.<br><b>Объём (V):</b> V = длина * ширина * высота." },
                    { title: "4. Обыкновенные дроби", text: "<b>Сложение:</b> Складывай верхние части (числители), нижнюю (знаменатель) оставляй как есть!<br><br><b>Метод «Бабочки»:</b> Чтобы сравнить дроби, умножай крест-накраст. Где результат больше, там и дробь больше." },
                    { title: "5. Десятичные дроби", text: "<b>Среднее:</b> Сложи все числа и подели на их количество.<br><br><b>Запятая:</b><br>• При умножении на 10, 100 — запятая едет ВПРАВО.<br>• При делении на 10, 100 — запятая едет ВЛЕВО." }
                ],
                questions: [
                    { q: "В одной книге 126 страниц, что в 3 раза больше, чем в другой. Сколько страниц во второй?", options: ["42", "378", "40"], correct: "42", solution: "Раз в первой больше, значит во второй меньше! Делим: 126 / 3 = 42." },
                    { q: "Ширина прямоугольника 8 см, а длина на 4 см больше. Найди периметр.", options: ["40 см", "24 см", "20 см"], correct: "40 см", solution: "1) Длина = 8 + 4 = 12. 2) P = (8 + 12) * 2 = 40." },
                    { q: "Вычисли: 3,27 + 12,5", options: ["15,77", "15,32", "15,52"], correct: "15,77", solution: "Складываем запятую под запятой: 3,27 + 12,50 = 15,77." },
                    { q: "Площадь квадрата равна 64 см². Какова его сторона?", options: ["8 см", "16 см", "32 см"], correct: "8 см", solution: "Ищем число, которое само на себя дает 64. Это 8 * 8 = 64!" },
                    { q: "В классе 25 учеников. 40% из них — девочки. Сколько их?", options: ["10", "15", "5"], correct: "10", solution: "Находим процент: 25 * 0,4 = 10 девочек." }
                ]
            }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const grade = urlParams.get('grade') || "5";

        function hideAll() { document.querySelectorAll('.card').forEach(c => c.classList.remove('active')); }
        function showMainMenu() { hideAll(); document.getElementById('main-menu').classList.add('active'); }

        function showTheoryMenu() {
            hideAll();
            const container = document.getElementById('theory-buttons');
            container.innerHTML = "";
            gradeData[grade].theoryBlocks.forEach((block, i) => {
                const b = document.createElement('button');
                b.className = "btn-block";
                b.innerText = block.title;
                b.onclick = () => {
                    hideAll();
                    document.getElementById('theory-title').innerText = block.title;
                    document.getElementById('theory-text').innerHTML = block.text;
                    document.getElementById('theory-view').classList.add('active');
                };
                container.appendChild(b);
            });
            document.getElementById('theory-menu').classList.add('active');
        }

        let curQ = 0; let qs = [];
        function startPractice() {
            hideAll(); curQ = 0;
            qs = [...gradeData[grade].questions].sort(() => Math.random() - 0.5);
            document.getElementById('quiz-screen').classList.add('active');
            renderQ();
        }

        function renderQ() {
            const q = qs[curQ];
            document.getElementById('q-progress').innerText = `МИССИЯ ${curQ + 1} / ${qs.length}`;
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('solution-box').style.display = "none";
            document.getElementById('next-btn').style.display = "none";
            const cont = document.getElementById('options');
            cont.innerHTML = "";
            q.options.forEach(o => {
                const b = document.createElement('button');
                b.innerText = o;
                b.onclick = () => {
                    const all = cont.querySelectorAll('button');
                    all.forEach(btn => btn.disabled = true);
                    if(o === q.correct) {
                        b.style.background = "#32CD32"; b.style.color = "white";
                    } else {
                        b.style.background = "#FF4500"; b.style.color = "white";
                        all.forEach(btn => { if(btn.innerText === q.correct) btn.style.background = "#32CD32"; btn.style.color = "white"; });
                    }
                    document.getElementById('solution-text').innerText = q.solution;
                    document.getElementById('solution-box').style.display = "block";
                    document.getElementById('next-btn').style.display = "block";
                };
                cont.appendChild(b);
            });
        }

        document.getElementById('next-btn').onclick = () => {
            curQ++;
            if(curQ < qs.length) renderQ();
            else showMainMenu();
        };

        // Анимация плавающих эмодзи
        function spawn() {
            const c = document.getElementById('floating-container');
            const i = document.createElement('div');
            i.innerText = ["🐱","🚀","🐶","⭐","📐","🔭"][Math.floor(Math.random()*6)];
            i.className = 'floater';
            i.style.left = Math.random()*95 + 'vw';
            i.style.fontSize = (25 + Math.random()*35) + 'px';
            i.style.animationDuration = (7 + Math.random()*10) + 's';
            c.appendChild(i);
            setTimeout(() => i.remove(), 15000);
        }
        setInterval(spawn, 1200);

        showMainMenu();
    </script>
</body>
</html>
