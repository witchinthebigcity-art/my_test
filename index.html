<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Universe: Full Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Montserrat:wght@700;900&family=Nunito:wght@700;900&family=Orbitron:wght@700;900&family=Oswald:wght@700;900&family=Roboto:wght@400;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            /* Цвета 5-7 */
            --sky: #87CEEB; --lime: #32CD32; --orange: #FF8C00;
            --turq: #00CED1; --purple: #4B0082; --coral: #FF7F50;
            --neon: #00ff41; --cyber-blue: #0d0221; --gold: #FFD700;
            
            /* Цвета 8 */
            --yellow: #FFFF00; --magenta: #FF00FF; --black: #000000; --white: #FFFFFF;
            
            /* Цвета 9 */
            --func-blue: #007AFF; --func-orange: #FF9500; --func-bg: #F5F5F7;
            
            /* Цвета 10 */
            --sage: #8DA399; --warm-white: #F9F7F2; --coffee: #4A403A;
            
            /* Цвета 11 */
            --deep-bg: #121212; --deep-accent: #0A84FF; --deep-text: #E0E0E0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; padding: 20px; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden; position: relative; transition: 0.5s;
            font-family: 'Roboto', sans-serif;
            background: #f0f0f0; 
        }

        /* --- СТИЛИ КЛАССОВ --- */
        
        /* 5-7 КЛАССЫ */
        body.grade-5 { background: linear-gradient(180deg, var(--sky) 0%, #E0F7FA 100%); font-family: 'Nunito', sans-serif; --acc: var(--orange); --btn: var(--lime); --card-bg: white; --text-col: #333; }
        body.grade-6 { background: #1A1A2E; font-family: 'Montserrat', sans-serif; color: #E1E8F0; --acc: var(--coral); --btn: var(--turq); --card-bg: rgba(26, 26, 46, 0.98); --text-col: #E1E8F0; }
        body.grade-7 { background: var(--cyber-blue); color: var(--neon); font-family: 'Roboto', sans-serif; --acc: #9d00ff; --btn: var(--neon); --card-bg: rgba(13, 2, 33, 0.95); --text-col: var(--neon); }
        body.grade-7 h2 { font-family: 'Orbitron', sans-serif; text-transform: uppercase; }
        
        /* 8 КЛАСС (BRUTAL) */
        body.grade-8 { background: var(--white); color: var(--black); font-family: 'Inter', sans-serif; --acc: var(--magenta); --btn: var(--yellow); --card-bg: var(--white); --text-col: var(--black); }
        body.grade-8 h2, body.grade-8 h3 { font-family: 'Oswald', sans-serif; text-transform: uppercase; margin: 0 0 20px 0; line-height: 1.1; }
        body.grade-8 h2 { font-size: 32px; border-bottom: 6px solid var(--black); padding-bottom: 10px; }
        body.grade-8 .card { border-radius: 0; border: 6px solid var(--black); box-shadow: 12px 12px 0 var(--magenta); }
        /* Исправление: убрали uppercase для кнопок ответов */
        body.grade-8 button { font-family: 'Oswald', sans-serif; border-radius: 0; border: 4px solid var(--black); box-shadow: 4px 4px 0 var(--black); text-transform: none; }

        /* 9 КЛАСС (FUNCTIONAL) */
        body.grade-9 { background: var(--func-bg); color: #1D1D1F; font-family: 'Roboto', sans-serif; --acc: var(--func-blue); --btn: var(--func-orange); --card-bg: #FFFFFF; --text-col: #1D1D1F; }
        body.grade-9 .card { border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border: none; }
        body.grade-9 button { border-radius: 8px; font-weight: 500; letter-spacing: 0.5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        body.grade-9 .hud-item { background: #E5E5EA; color: #000; box-shadow: none; }

        /* 10 КЛАСС (STUDY CAFE) */
        body.grade-10 { background: var(--warm-white); color: var(--coffee); font-family: 'Merriweather', serif; --acc: var(--sage); --btn: #6B7F75; --card-bg: #FFFEFA; --text-col: var(--coffee); }
        body.grade-10 .card { border-radius: 20px; border: 1px solid #E0DCD0; box-shadow: 5px 5px 0 var(--sage); }
        body.grade-10 button { border-radius: 50px; font-family: 'Merriweather', serif; font-weight: 700; box-shadow: none; border: 2px solid var(--sage); }
        body.grade-10 h2 { font-style: italic; }

        /* 11 КЛАСС (DEEP FOCUS) */
        body.grade-11 { background: var(--deep-bg); color: var(--deep-text); font-family: system-ui, -apple-system, sans-serif; --acc: var(--deep-accent); --btn: #30D158; --card-bg: #1C1C1E; --text-col: #E0E0E0; }
        body.grade-11 .card { border-radius: 16px; border: 1px solid #333; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        body.grade-11 button { border-radius: 10px; font-weight: 600; background: #2C2C2E; color: #FFF; border: 1px solid #444; }
        body.grade-11 .btn-ok { background: var(--btn) !important; color: #000 !important; border: none; }
        body.grade-11 .hud-item { background: #2C2C2E; color: #FFF; border: 1px solid #444; }

        /* ОБЩИЕ */
        #hud { position: fixed; top: 15px; width: 90%; max-width: 400px; display: flex; justify-content: space-between; z-index: 100; }
        .hud-item { background: white; padding: 10px 18px; border-radius: 25px; font-weight: 900; color: #333; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .card { 
            background: var(--card-bg); border-radius: 35px; padding: 30px;
            width: 100%; max-width: 440px; text-align: center; position: relative; z-index: 10; display: none;
            max-height: 85vh; overflow-y: auto; color: var(--text-col);
            box-shadow: 0 12px 0 rgba(0,0,0,0.1); border: 4px solid #333;
        }
        
        /* Сетка для выбора классов */
        .grid-select { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }

        .active { display: block; animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from {transform: scale(0.95); opacity:0;} to {transform: scale(1); opacity:1;} }

        button { 
            font-family: inherit; border: none; padding: 16px 10px; border-radius: 20px; 
            width: 100%; margin: 10px 0; font-weight: 900; font-size: 18px; cursor: pointer; 
            transition: 0.2s; box-shadow: 0 6px 0 rgba(0,0,0,0.2);
            display: flex; align-items: center; justify-content: center;
        }
        button:active { transform: translateY(3px); opacity: 0.8; }
        
        .btn-acc { background: var(--acc); color: white; }
        .btn-ok { background: var(--btn); color: #fff; }
        
        /* Специфика для 8 класса */
        body.grade-8 .btn-acc { background: var(--magenta); color: white; }
        body.grade-8 .btn-ok { background: var(--yellow); color: black; }

        /* ШРИФТЫ ЗАДАНИЙ */
        #q-text { font-size: 19px; font-weight: 700; margin-bottom: 20px; line-height: 1.6; text-align: left; }
        body.grade-5 #q-text { font-size: 18px; } 
        body.grade-8 #q-text { font-size: 20px; }
        body.grade-10 #q-text { font-weight: 400; font-size: 18px; line-height: 1.8; }

        .theory-box { text-align: left; padding: 20px; border-radius: 25px; border: 3px dashed var(--acc); margin-bottom: 15px; font-size: 16px; line-height: 1.5; }
        body.grade-8 .theory-box { border-radius: 0; border: 4px solid var(--black); }
        body.grade-9 .theory-box { border: 2px solid var(--acc); border-style: solid; border-radius: 8px; background: #F2F2F7; }
        body.grade-10 .theory-box { border: 1px solid var(--sage); background: #F9F7F2; border-radius: 15px; }
        body.grade-11 .theory-box { border: 1px solid #444; background: #2C2C2E; }

        #solution-box { display: none; padding: 20px; border-radius: 25px; margin-top: 20px; text-align: left; border: 3px solid var(--btn); background: rgba(0,0,0,0.05); }
        body.grade-8 #solution-box { border-radius: 0; border: 4px solid var(--black); background: var(--yellow); }
        body.grade-11 #solution-box { background: #121212; border-color: var(--deep-accent); color: #fff; }

        .katex-display { margin: 8px 0 !important; }
        
        #floating-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .floater { position: absolute; bottom: -100px; opacity: 0.3; animation: floatUp linear forwards; }
        @keyframes floatUp { from { transform: translateY(0); } to { transform: translateY(-120vh); } }
        
        #error-msg { display: none; color: red; background: white; padding: 20px; border-radius: 10px; z-index: 999; position: relative; }
        #loading-indicator { display: none; font-size: 14px; opacity: 0.7; margin-top: 10px; }
    </style>
</head>
<body class="grade-5">

    <div id="error-msg">Ошибка загрузки.</div>

    <div id="hud">
        <div class="hud-item">❤️ <span id="lives">5</span></div>
        <div class="hud-item">💰 <span id="coins">0</span></div>
    </div>

    <div id="floating-container"></div>

    <div id="grade-selector" class="card">
        <h2>ВЫБЕРИ УРОВЕНЬ</h2>
        <p>Каждый класс — это свой стиль и задачи.</p>
        <div class="grid-select">
            <button onclick="switchGrade('5')" style="background: #87CEEB;">5 КЛАСС</button>
            <button onclick="switchGrade('6')" style="background: #1A1A2E; color: white;">6 КЛАСС</button>
            <button onclick="switchGrade('7')" style="background: #0d0221; color: #00ff41;">7 КЛАСС</button>
            <button onclick="switchGrade('8')" style="background: #FFFFFF; color: black; border: 3px solid black;">8 КЛАСС</button>
            <button onclick="switchGrade('9')" style="background: #007AFF; color: white;">9 ОГЭ</button>
            <button onclick="switchGrade('10')" style="background: #8DA399; color: white;">10 PRO</button>
            <button onclick="switchGrade('11')" style="background: #121212; color: white;">11 ЕГЭ</button>
        </div>
    </div>

    <div id="main-menu" class="card">
        <div id="hero" style="font-size: 75px; margin-bottom: 10px;">🐱🚀</div>
        <h2 id="grade-title" style="font-size: 28px; margin: 10px 0;">Загрузка...</h2>
        <p id="grade-desc" style="font-size: 15px; margin-bottom: 20px; opacity: 0.8; font-weight: 700;"></p>
        
        <div id="loading-indicator">📥 Синхронизация с облаком...</div>

        <button class="btn-acc" onclick="showTheoryMenu()">📖 ТЕОРИЯ</button>
        <button class="btn-ok" onclick="startPractice()">🚀 ПРАКТИКА</button>
        <button onclick="showShop()" style="background: var(--gold); color: #000;">🛒 МАГАЗИН</button>
        
        <button onclick="showGradeSelector()" style="background: rgba(0,0,0,0.1); font-size: 14px; margin-top: 15px;">🔄 СМЕНИТЬ КЛАСС</button>
    </div>

    <div id="theory-menu" class="card">
        <h3>База Знаний</h3>
        <div id="theory-list"></div>
        <button onclick="showMainMenu()" style="background:#6c757d; color:white;">⬅️ НАЗАД</button>
    </div>

    <div id="theory-view" class="card">
        <h3 id="view-title" style="font-size: 22px; color: var(--acc);"></h3>
        <div id="view-content" class="theory-box"></div>
        <button class="btn-acc" onclick="showTheoryMenu()">ПОНЯТНО</button>
    </div>

    <div id="shop" class="card">
        <h2 style="color: var(--gold);">🛒 МАГАЗИН</h2>
        <p>В разработке...</p>
        <button onclick="showMainMenu()" style="background:#6c757d; color:white; margin-top: 15px;">⬅️ НАЗАД</button>
    </div>

    <div id="quiz" class="card">
        <div id="progress" style="font-size: 15px; margin-bottom: 15px; font-weight: 900; opacity: 0.6;"></div>
        <div id="q-text"></div>
        <div id="options"></div>
        <div id="solution-box">
            <b id="sol-hero" style="font-size: 18px;">🔬 Разбор:</b><br>
            <div id="solution-text" style="margin-top: 10px;"></div>
        </div>
        <button id="next-btn" class="btn-ok" style="display:none; margin-top:20px;">ДАЛЬШЕ ➡️</button>
    </div>

    <div id="final" class="card">
        <h2 id="final-status">Итоги</h2>
        <div id="stats" class="theory-box" style="text-align: center; font-size: 20px;"></div>
        <div id="retry-area"></div>
        <button class="btn-acc" onclick="showMainMenu()">В МЕНЮ</button>
    </div>

    <script>
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSyYBIArwn-npZYPgPwIazi4HzVR4DzusAc1VvJ_eQklHkYBElS7r0pwZzx-Pe2tPnoop9sFBpFMZWj/pub?output=csv";

    try {
        const tg = window.Telegram.WebApp; 
        tg.expand();
        
        let state = { lives: 5, coins: 0, currentIdx: 0, questions: [], errorsByBlock: {} };
        let remoteDatabase = []; 
        let currentGrade = "5"; // Класс по умолчанию

        window.renderMath = function(text, element, isDisplay = false) {
            try {
                element.innerHTML = text.replace(/\$([^$]+)\$/g, (match, formula) => {
                    return katex.renderToString(formula, { throwOnError: false, displayMode: isDisplay });
                });
            } catch (e) { element.innerHTML = text; }
        };

        const data = {
            "5": {
                name: "5 Класс", hero: "🐱🚀", desc: "Космическая математика",
                theory: [
                    { title: "1. Натуральные числа", text: "Натуральные числа — это те, что мы используем для счета ($1, 2, 3...$). Ноль не является натуральным числом.<br><b>Свойства:</b><br>$a + 0 = a$<br>$a \\cdot 0 = 0$<br><b>Метод Гаусса</b>: $\\frac{n(n+1)}{2}$." },
                    { title: "2. Умножение и уравнения", text: "<b>Фонтанчик:</b> $a \\cdot (b + c) = ab + ac$.<br><b>Степень:</b><br>$a^2 = a \\cdot a$ (Квадрат)<br>$a^3 = a \\cdot a \\cdot a$ (Куб)<br>Уравнение — это весы, где левая часть равна правой." },
                    { title: "3. Геометрия", text: "<b>Периметр:</b> $P = 2 \\cdot (a + b)$.<br><b>Площадь:</b> $S = a \\cdot b$.<br><b>Объем:</b> $V = a \\cdot b \\cdot c$.<br>Помни: $10^2 = 100$ (перевод квадратных единиц)." },
                    { title: "4. Обыкновенные дроби", text: "Сложение (одинаковый низ): $\\frac{a}{c} + \\frac{b}{c} = \\frac{a+b}{c}$.<br>Сравнение (метод бабочки): перемножаем крест-накраст: $\\frac{3}{5}$ vs $\\frac{4}{7} \\implies 21 > 20$." },
                    { title: "5. Десятичные дроби", text: "Умножение на 10, 100 $\\to$ запятая <b>вправо</b>.<br>Деление на 10, 100 $\\to$ запятая <b>влево</b>.<br>Среднее арифметическое: сумма всех чисел деленная на их количество." }
                ],
                questions: [
                   { q: "В одной книге 126 страниц, что в 3 раза больше, чем в другой. Сколько страниц во второй?", opt: ["42", "378", "123", "40"], cor: "42", sol: "$126 : 3 = 42$", bId: "Числа" },
                   { q: "$45 + 15 \\cdot (102 - 92)$", opt: ["195", "600", "150"], cor: "195", sol: "$15 \\cdot 10 + 45 = 195$", bId: "Действия" },
                   { q: "35 см от метра это:", opt: ["$\\frac{35}{100}$", "$\\frac{35}{10}$", "$\\frac{3}{5}$"], cor: "$\\frac{35}{100}$", sol: "1м = 100см", bId: "Дроби" },
                   { q: "Площадь квадрата 64 см$^2$. Сторона?", opt: ["8", "16", "32"], cor: "8", sol: "$8 \\cdot 8 = 64$", bId: "Геометрия" },
                   { q: "40% от 25 учеников это:", opt: ["10", "15", "5"], cor: "10", sol: "$25 \\cdot 0,4 = 10$", bId: "Проценты" },
                   { q: "$3,27 + 12,5$", opt: ["15,77", "15,32", "157,7"], cor: "15,77", sol: "Запятая под запятой.", bId: "Дроби" },
                   { q: "Периметр (8 и 12 см)", opt: ["40", "20", "96"], cor: "40", sol: "$(8+12)\\cdot 2 = 40$", bId: "Геометрия" },
                   { q: "Округлить 452,38 до целых", opt: ["452", "453", "450"], cor: "452", sol: "3 меньше 5 -> вниз", bId: "Округление" },
                   { q: "Объем (2, 5, 10)", opt: ["100", "50", "17"], cor: "100", sol: "$2\\cdot 5\\cdot 10 = 100$", bId: "Объем" },
                   { q: "Уравнение $x-14.8=5.2$", opt: ["20", "19", "9.6"], cor: "20", sol: "Складываем.", bId: "Уравнения" }
                ]
            },
            "6": {
                name: "6 Класс", hero: "🤖🛰️", desc: "Дроби, проценты и пропорции",
                theory: [
                    { title: "1. Теория чисел", text: "Любое составное число можно разложить на простые множители: $n = p_1^{a} \\cdot p_2^{b}$. Это «ДНК» числа для поиска НОК и НОД." },
                    { title: "2. Сложение дробей", text: "<b>Нельзя</b> складывать дроби с разными знаменателями! Сначала ищем НОК, потом домножаем и складываем верхушки." },
                    { title: "3. Умножение/Деление", text: "Умножение: числитель на числитель, низ на низ.<br>Деление: вторую дробь переворачиваем и умножаем." },
                    { title: "4. Пропорции", text: "Правило креста: $\\frac{a}{b} = \\frac{c}{d} \\iff a \\cdot d = b \\cdot c$." },
                    { title: "5. Отрицательные числа", text: "Модуль $|a|$ — это расстояние (всегда +).<br>Знаки: минус на минус = плюс. Разные знаки = минус." },
                    { title: "6. Раскрытие скобок", text: "Минус перед скобкой меняет знаки внутри: $-(a-b) = -a+b$." }
                ],
                questions: [
                    { q: "НОК(12, 15)", opt: ["60", "30", "180", "3"], cor: "60", sol: "60 делится на 12 и 15", bId: "Числа" },
                    { q: "Пропорция: $12:x = 4:5$", opt: ["15", "10", "20", "9"], cor: "15", sol: "$4x=60 \\implies x=15$", bId: "Пропорции" },
                    { q: "$-18 + (-7) - (-10)$", opt: ["-15", "-35", "-25", "15"], cor: "-15", sol: "$-18-7+10=-15$", bId: "Отрицательные" },
                    { q: "Длина окружности $R=5$ ($\\pi=3,14$)", opt: ["31,4", "15,7", "78,5"], cor: "31,4", sol: "$2\\pi R = 31,4$", bId: "Геометрия" },
                    { q: "Модуль $|-12,4| + |3,6|$", opt: ["16", "8,8", "-8,8"], cor: "16", sol: "Модуль съедает минус.", bId: "Модуль" },
                    { q: "Четверть точки A(-5; 8)", opt: ["II", "I", "III"], cor: "II", sol: "x минус, y плюс", bId: "Координаты" },
                    { q: "Упростить $3(x-2)-2(x-3)$", opt: ["$x$", "$5x$", "$x-12$"], cor: "$x$", sol: "$3x-6-2x+6=x$", bId: "Алгебра" },
                    { q: "$(-2,5) \\cdot (-4) \\cdot 0,3$", opt: ["3", "-3", "30"], cor: "3", sol: "$10 \\cdot 0,3 = 3$", bId: "Числа" },
                    { q: "Масштаб 1:500000. 4см на карте.", opt: ["20 км", "2 км", "200 км"], cor: "20 км", sol: "$4 \\cdot 5 = 20$", bId: "Масштаб" },
                    { q: "$5x-12=2x+6$", opt: ["6", "2", "-2"], cor: "6", sol: "$3x=18$", bId: "Уравнения" }
                ]
            },
            "7": {
                name: "7 Класс", hero: "👩🏻‍🎤⚡", desc: "Алгебра, ФСУ и Функции",
                theory: [
                    { title: "1. Свойства степеней", text: "$a^n \\cdot a^m = a^{n+m}$<br>$(a^n)^m = a^{nm}$<br>При умножении показатели складываются, при возведении в степень — перемножаются." },
                    { title: "2. Линейная функция", text: "$y = kx + b$.<br>$k$ — наклон прямой.<br>$b$ — точка пересечения с осью Y." },
                    { title: "3. Умножение многочленов", text: "Правило фонтанчика: $(a+b)(c+d) = ac + ad + bc + bd$. Умножаем каждого на каждого." },
                    { title: "4. Формулы ФСУ", text: "$(a+b)^2 = a^2 + 2ab + b^2$<br>$(a-b)(a+b) = a^2 - b^2$ (Разность квадратов)." },
                    { title: "5. Системы уравнений", text: "Найти $x$ и $y$, которые подходят обоим уравнениям. Геометрически — это точка пересечения прямых." },

        async function loadRemoteData() {
            try {
                document.getElementById('loading-indicator').style.display = 'block';
                const response = await fetch(SHEET_CSV_URL);
                const dataText = await response.text();
                
                const rows = dataText.split('\n').slice(1); 
                remoteDatabase = rows.map(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length < 7) return null;
                    const options = [cols[2], cols[3], cols[4], cols[5]].map(s => s?.replace(/^"|"$/g, '').trim());
                    const correctText = cols[6]?.trim();
                    let finalCorrect = correctText;
                    if (correctText?.includes("Вариант 1")) finalCorrect = options[0];
                    else if (correctText?.includes("Вариант 2")) finalCorrect = options[1];
                    else if (correctText?.includes("Вариант 3")) finalCorrect = options[2];
                    else if (correctText?.includes("Вариант 4")) finalCorrect = options[3];

                    return {
                        grade: cols[0].trim(),
                        q: cols[1].replace(/^"|"$/g, '').trim(),
                        opt: options,
                        cor: finalCorrect,
                        sol: cols[7]?.replace(/^"|"$/g, '').trim() || "..."
                    };
                }).filter(item => item !== null);
                
                document.getElementById('loading-indicator').innerText = "✅ Облако подключено";
                setTimeout(() => document.getElementById('loading-indicator').style.display = 'none', 2000);
            } catch (e) { document.getElementById('loading-indicator').innerText = "⚠️ Ошибка связи"; }
        }

        // --- ЛОГИКА СМЕНЫ КЛАССА ---
        window.switchGrade = function(newGrade) {
            currentGrade = newGrade;
            hide();
            // Обновляем body class для стилей
            document.body.className = "grade-" + newGrade;
            // Обновляем данные на главной
            const curData = data[newGrade] || data["5"];
            document.getElementById('grade-title').innerText = curData.name;
            document.getElementById('hero').innerText = curData.hero;
            document.getElementById('grade-desc').innerText = curData.desc || "";
            
            // Запускаем подгрузку если старшие классы
            if (parseInt(newGrade) >= 9) loadRemoteData();

            // Показываем меню
            document.getElementById('main-menu').classList.add('active');
            
            // Настройка кнопки назад в магазине
            if(newGrade === "8") document.querySelector('#shop button').innerText = "⬅️ НАЗАД";
        }

        window.showGradeSelector = function() {
            hide();
            document.getElementById('grade-selector').classList.add('active');
        }

        window.showMainMenu = function() { 
            tg.MainButton.hide(); 
            hide(); 
            document.getElementById('main-menu').classList.add('active'); 
        }
        
        window.showShop = function() { hide(); document.getElementById('shop').classList.add('active'); }
        window.hide = function() { document.querySelectorAll('.card').forEach(c => c.classList.remove('active')); }

        window.showTheoryMenu = function() {
            hide();
            const list = document.getElementById('theory-list');
            list.innerHTML = "";
            const curData = data[currentGrade];
            curData.theory.forEach((t) => {
                const b = document.createElement('button');
                b.className = (currentGrade==="8"||currentGrade==="11") ? "btn-ok" : ((currentGrade==="10") ? "btn-ok" : "btn-ok"); 
                if(currentGrade==="10") b.style.borderRadius="15px";
                if(parseInt(currentGrade)<=7) { b.style.background="#eee"; b.style.color="#333"; }
                
                b.innerText = t.title;
                b.onclick = () => {
                    hide();
                    document.getElementById('view-title').innerText = t.title;
                    const contentArea = document.getElementById('view-content');
                    contentArea.innerHTML = "";
                    renderMath(t.text, contentArea);
                    document.getElementById('theory-view').classList.add('active');
                };
                list.appendChild(b);
            });
            document.getElementById('theory-menu').classList.add('active');
        }

        window.startPractice = async function() {
            hide();
            state.lives = 5; state.coins = 0; state.currentIdx = 0; state.errorsByBlock = {};
            let pool = [];

            if (parseInt(currentGrade) >= 9) {
                if (remoteDatabase.length === 0) await loadRemoteData();
                pool = remoteDatabase.filter(item => item.grade == currentGrade);
            } else {
                pool = data[currentGrade].questions;
            }

            if (!pool || pool.length === 0) {
                alert("Задания загружаются. Жми еще раз!");
                showMainMenu();
                return;
            }

            state.questions = pool.sort(() => Math.random() - 0.5).slice(0, 10);
            updateHUD();
            document.getElementById('quiz').classList.add('active');
            renderQ();
        }

        window.updateHUD = function() {
            document.getElementById('lives').innerText = state.lives;
            document.getElementById('coins').innerText = state.coins;
        }

        window.renderQ = function() {
            if(state.lives <= 0) { finish(false); return; }
            if(state.currentIdx >= state.questions.length) { finish(true); return; }

            const q = state.questions[state.currentIdx];
            document.getElementById('progress').innerText = `${state.currentIdx + 1} / ${state.questions.length}`;
            
            const qContainer = document.getElementById('q-text');
            qContainer.innerHTML = "";
            renderMath(q.q, qContainer, q.q.includes('cases'));

            document.getElementById('solution-box').style.display = "none";
            document.getElementById('next-btn').style.display = "none";
            
            const optCont = document.getElementById('options');
            optCont.innerHTML = "";
            q.opt.forEach(o => {
                const b = document.createElement('button');
                renderMath(o, b);
                if(currentGrade === "10") b.style.borderRadius = "20px";
                if(currentGrade === "9") b.style.background = "#fff";

                b.onclick = () => {
                    const all = optCont.querySelectorAll('button');
                    all.forEach(btn => btn.disabled = true);
                    const normalize = (str) => str.replace(/\$/g, '').trim();
                    const isCorrect = normalize(o) === normalize(q.cor);

                    if(isCorrect) {
                        b.style.background = "#32CD32"; b.style.color = "white"; state.coins += 5;
                    } else {
                        b.style.background = "#FF4500"; b.style.color = "white"; state.lives--;
                        state.errorsByBlock[q.bId || "Общее"] = 1;
                        all.forEach(btn => { if(normalize(btn.innerText) === normalize(q.cor)) { btn.style.background = "#32CD32"; btn.style.color="white"; } });
                    }
                    updateHUD();
                    const solArea = document.getElementById('solution-text');
                    solArea.innerHTML = "";
                    renderMath(q.sol, solArea);
                    document.getElementById('solution-box').style.display = "block";
                    document.getElementById('next-btn').style.display = "block";
                };
                optCont.appendChild(b);
            });
        }

        document.getElementById('next-btn').onclick = () => { state.currentIdx++; renderQ(); };

        window.finish = function(win) {
            hide();
            document.getElementById('final').classList.add('active');
            document.getElementById('stats').innerHTML = `<h3>${win ? 'ПОБЕДА!' : 'НЕУДАЧА'}</h3><p>Монеты: ${state.coins}</p>`;
            
            const retryArea = document.getElementById('retry-area');
            retryArea.innerHTML = "";
            const btn = document.createElement('button');
            btn.className = "btn-acc"; 
            btn.innerText = "В ГЛАВНОЕ МЕНЮ";
            btn.onclick = showMainMenu;
            retryArea.appendChild(btn);

            const resultData = { action: "quiz_finished", grade: currentGrade, coins: state.coins };
            tg.MainButton.text = "ОТПРАВИТЬ";
            tg.MainButton.show();
            tg.onEvent('mainButtonClicked', function() { tg.sendData(JSON.stringify(resultData)); tg.close(); });
        }

        window.spawn = function() {
            const c = document.getElementById('floating-container');
            const d = document.createElement('div');
            d.className = 'floater';
            d.innerText = ["⚡","📚","📐"][Math.floor(Math.random()*3)];
            d.style.left = Math.random()*95 + "vw";
            d.style.animationDuration = (6+Math.random()*6) + "s";
            c.appendChild(d);
            setTimeout(() => d.remove(), 12000);
        }
        setInterval(spawn, 1500);

        // Инициализация
        const params = new URLSearchParams(window.location.search);
        const urlGrade = params.get('grade');
        if (urlGrade && data[urlGrade]) {
            switchGrade(urlGrade);
        } else {
            showGradeSelector(); // Если класса нет в ссылке, показываем меню
        }

    } catch (e) { document.getElementById('error-msg').style.display = 'block'; }
    </script>
