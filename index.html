<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Universe: Knowledge Base</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Montserrat:wght@700;900&family=Nunito:wght@700;900&family=Orbitron:wght@700;900&family=Oswald:wght@700;900&family=Roboto:wght@400;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            /* Цвета 5-7 */
            --sky: #87CEEB; --lime: #32CD32; --orange: #FF8C00;
            --turq: #00CED1; --purple: #4B0082; --coral: #FF7F50;
            --neon: #00ff41; --cyber-blue: #0d0221; --gold: #FFD700;
            /* Цвета 8 */
            --yellow: #FFFF00; --magenta: #FF00FF; --black: #000000; --white: #FFFFFF;
            /* Цвета 9 */
            --func-blue: #007AFF; --func-orange: #FF9500; --func-bg: #F5F5F7;
            /* Цвета 10 */
            --sage: #8DA399; --warm-white: #F9F7F2; --coffee: #4A403A;
            /* Цвета 11 */
            --deep-bg: #121212; --deep-accent: #0A84FF; --deep-text: #E0E0E0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; padding: 20px; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden; position: relative; transition: 0.5s;
            font-family: 'Roboto', sans-serif;
            background: #f0f0f0; 
        }

        /* СТИЛИ */
        body.grade-5 { background: linear-gradient(180deg, var(--sky) 0%, #E0F7FA 100%); font-family: 'Nunito', sans-serif; --acc: var(--orange); --btn: var(--lime); --card-bg: white; --text-col: #333; }
        body.grade-6 { background: #1A1A2E; font-family: 'Montserrat', sans-serif; color: #E1E8F0; --acc: var(--coral); --btn: var(--turq); --card-bg: rgba(26, 26, 46, 0.98); --text-col: #E1E8F0; }
        body.grade-7 { background: var(--cyber-blue); color: var(--neon); font-family: 'Roboto', sans-serif; --acc: #9d00ff; --btn: var(--neon); --card-bg: rgba(13, 2, 33, 0.95); --text-col: var(--neon); }
        body.grade-7 h2 { font-family: 'Orbitron', sans-serif; text-transform: uppercase; }
        
        body.grade-8 { background: var(--white); color: var(--black); font-family: 'Inter', sans-serif; --acc: var(--magenta); --btn: var(--yellow); --card-bg: var(--white); --text-col: var(--black); }
        body.grade-8 h2, body.grade-8 h3 { font-family: 'Oswald', sans-serif; text-transform: uppercase; margin: 0 0 20px 0; line-height: 1.1; }
        body.grade-8 h2 { font-size: 32px; border-bottom: 6px solid var(--black); padding-bottom: 10px; }
        body.grade-8 .card { border-radius: 0; border: 6px solid var(--black); box-shadow: 12px 12px 0 var(--magenta); }
        body.grade-8 button { font-family: 'Oswald', sans-serif; border-radius: 0; border: 4px solid var(--black); box-shadow: 4px 4px 0 var(--black); text-transform: none; }

        body.grade-9 { background: var(--func-bg); color: #1D1D1F; font-family: 'Roboto', sans-serif; --acc: var(--func-blue); --btn: var(--func-orange); --card-bg: #FFFFFF; --text-col: #1D1D1F; }
        body.grade-9 .card { border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border: none; }
        body.grade-9 button { border-radius: 8px; font-weight: 500; letter-spacing: 0.5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        body.grade-9 .hud-item { background: #E5E5EA; color: #000; box-shadow: none; }

        body.grade-10 { background: var(--warm-white); color: var(--coffee); font-family: 'Merriweather', serif; --acc: var(--sage); --btn: #6B7F75; --card-bg: #FFFEFA; --text-col: var(--coffee); }
        body.grade-10 .card { border-radius: 20px; border: 1px solid #E0DCD0; box-shadow: 5px 5px 0 var(--sage); }
        body.grade-10 button { border-radius: 50px; font-family: 'Merriweather', serif; font-weight: 700; box-shadow: none; border: 2px solid var(--sage); }
        body.grade-10 h2 { font-style: italic; }

        body.grade-11 { background: var(--deep-bg); color: var(--deep-text); font-family: system-ui, -apple-system, sans-serif; --acc: var(--deep-accent); --btn: #30D158; --card-bg: #1C1C1E; --text-col: #E0E0E0; }
        body.grade-11 .card { border-radius: 16px; border: 1px solid #333; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        body.grade-11 button { border-radius: 10px; font-weight: 600; background: #2C2C2E; color: #FFF; border: 1px solid #444; }
        body.grade-11 .btn-ok { background: var(--btn) !important; color: #000 !important; border: none; }
        body.grade-11 .hud-item { background: #2C2C2E; color: #FFF; border: 1px solid #444; }

        /* ОБЩИЕ ЭЛЕМЕНТЫ */
        #hud { position: fixed; top: 15px; width: 90%; max-width: 400px; display: none; justify-content: space-between; z-index: 100; }
        .hud-item { background: white; padding: 10px 18px; border-radius: 25px; font-weight: 900; color: #333; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .card { 
            background: var(--card-bg); border-radius: 35px; padding: 30px;
            width: 100%; max-width: 440px; text-align: center; position: relative; z-index: 10; display: none;
            max-height: 85vh; overflow-y: auto; color: var(--text-col);
            box-shadow: 0 12px 0 rgba(0,0,0,0.1); border: 4px solid #333;
        }
        
        .active { display: block; animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from {transform: scale(0.95); opacity:0;} to {transform: scale(1); opacity:1;} }

        button { 
            font-family: inherit; border: none; padding: 16px 10px; border-radius: 20px; 
            width: 100%; margin: 10px 0; font-weight: 900; font-size: 18px; cursor: pointer; 
            transition: 0.2s; box-shadow: 0 6px 0 rgba(0,0,0,0.2);
            display: flex; align-items: center; justify-content: center;
        }
        button:active { transform: translateY(3px); opacity: 0.8; }
        
        .btn-acc { background: var(--acc); color: white; }
        .btn-ok { background: var(--btn); color: #fff; }
        .btn-gray { background: #6c757d; color: white; }
        
        /* Сетка выбора */
        .grid-select { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }

        input {
            width: 100%; padding: 15px; border-radius: 15px; border: 3px solid #333; 
            font-size: 18px; margin-bottom: 10px; text-align: center; font-family: inherit;
        }

        #q-text { font-size: 19px; font-weight: 700; margin-bottom: 20px; line-height: 1.6; text-align: left; }
        body.grade-5 #q-text { font-size: 18px; } 
        body.grade-8 #q-text { font-size: 20px; }
        body.grade-10 #q-text { font-weight: 400; font-size: 18px; line-height: 1.8; }

        .theory-box { text-align: left; padding: 20px; border-radius: 25px; border: 3px dashed var(--acc); margin-bottom: 15px; font-size: 16px; line-height: 1.5; }
        body.grade-8 .theory-box { border-radius: 0; border: 4px solid var(--black); }
        body.grade-9 .theory-box { border: 2px solid var(--acc); border-style: solid; border-radius: 8px; background: #F2F2F7; }
        body.grade-10 .theory-box { border: 1px solid var(--sage); background: #F9F7F2; border-radius: 15px; }
        body.grade-11 .theory-box { border: 1px solid #444; background: #2C2C2E; }

        #solution-box { display: none; padding: 20px; border-radius: 25px; margin-top: 20px; text-align: left; border: 3px solid var(--btn); background: rgba(0,0,0,0.05); }
        body.grade-8 #solution-box { border-radius: 0; border: 4px solid var(--black); background: var(--yellow); }
        body.grade-11 #solution-box { background: #121212; border-color: var(--deep-accent); color: #fff; }

        .katex-display { margin: 8px 0 !important; }
        
        #floating-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .floater { position: absolute; bottom: -100px; opacity: 0.3; animation: floatUp linear forwards; }
        body.grade-8 .floater { opacity: 0.15; font-weight: 900; }
        @keyframes floatUp { from { transform: translateY(0); } to { transform: translateY(-120vh); } }
        
        #loading-indicator { display: none; font-size: 14px; opacity: 0.7; margin-top: 10px; }
    </style>
</head>
<body class="grade-5">

    <div id="hud">
        <div class="hud-item">❤️ <span id="lives">5</span></div>
        <div class="hud-item">💰 <span id="coins">0</span></div>
    </div>

    <div id="floating-container"></div>

    <div id="welcome-screen" class="card">
        <div style="font-size: 65px;">👋</div>
        <h2 style="font-family: 'Montserrat', sans-serif;">ПРИВЕТ!</h2>
        <p>Добро пожаловать. Как нам тебя называть?</p>
        <input type="text" id="user-name-input" placeholder="Твое имя...">
        
        <p style="margin-top: 15px;">Введи свой класс (5-11):</p>
        <input type="number" id="user-grade-input" placeholder="Номер..." min="5" max="11">
        
        <p style="margin: 10px 0; opacity: 0.5;">— ИЛИ ВЫБЕРИ БЫСТРО —</p>
        <div class="grid-select" style="grid-template-columns: repeat(4, 1fr); gap: 5px;">
            <button onclick="document.getElementById('user-grade-input').value='5'" style="height: 40px; font-size: 14px; background: #87CEEB;">5</button>
            <button onclick="document.getElementById('user-grade-input').value='6'" style="height: 40px; font-size: 14px; background: #1A1A2E; color:white;">6</button>
            <button onclick="document.getElementById('user-grade-input').value='7'" style="height: 40px; font-size: 14px; background: #0d0221; color:#00ff41;">7</button>
            <button onclick="document.getElementById('user-grade-input').value='8'" style="height: 40px; font-size: 14px; background: white; border:1px solid black; color:black;">8</button>
        </div>
        
        <button class="btn-ok" style="margin-top: 20px;" onclick="saveFullProfile()">ПРОДОЛЖИТЬ</button>
    </div>

    <div id="grade-selector" class="card">
        <h2>ВЫБЕРИ УРОВЕНЬ</h2>
        <div class="grid-select">
            <button onclick="switchGrade('5')" style="background: #87CEEB;">5 КЛАСС</button>
            <button onclick="switchGrade('6')" style="background: #1A1A2E; color: white;">6 КЛАСС</button>
            <button onclick="switchGrade('7')" style="background: #0d0221; color: #00ff41;">7 КЛАСС</button>
            <button onclick="switchGrade('8')" style="background: #FFFFFF; color: black; border: 3px solid black;">8 КЛАСС</button>
            <button onclick="switchGrade('9')" style="background: #007AFF; color: white;">9 ОГЭ</button>
            <button onclick="switchGrade('10')" style="background: #8DA399; color: white;">10 PRO</button>
            <button onclick="switchGrade('11')" style="background: #121212; color: white;">11 ЕГЭ</button>
        </div>
    </div>

    <div id="main-menu" class="card">
        <div id="hero" style="font-size: 75px; margin-bottom: 10px;">🐱🚀</div>
        <h2 id="grade-title"></h2>
        <p id="grade-desc" style="font-weight: 700; opacity: 0.8;"></p>
        
        <button class="btn-ok" onclick="startPractice(false)">🚀 СТАРТ</button>
        <button class="btn-acc" onclick="showTheoryMenu()">📖 СПРАВОЧНИК</button>
        <button onclick="showShop()" style="background: var(--gold); color: #000;">🛒 МАГАЗИН</button>
        <button onclick="showGradeSelector()" style="background: rgba(0,0,0,0.1); font-size: 14px; margin-top: 15px;">🔄 СМЕНИТЬ КЛАСС</button>
    </div>

    <div id="theory-menu" class="card">
        <h3>Темы</h3>
        <div id="theory-list"></div>
        <button onclick="showMainMenu()" class="btn-gray">⬅️ НАЗАД</button>
    </div>

    <div id="theory-view" class="card">
        <h3 id="view-title" style="font-size: 22px; color: var(--acc);"></h3>
        <div id="view-content" class="theory-box"></div>
        <button class="btn-acc" onclick="showTheoryMenu()">ПОНЯТНО</button>
    </div>

    <div id="shop" class="card">
        <h2 style="color: var(--gold);">🛒 МАГАЗИН</h2>
        <p>Скоро открытие...</p>
        <button onclick="showMainMenu()" class="btn-gray">⬅️ НАЗАД</button>
    </div>

    <div id="quiz" class="card">
        <div id="progress" style="font-size: 15px; margin-bottom: 15px; font-weight: 900; opacity: 0.6;"></div>
        <div id="q-text"></div>
        <div id="options"></div>
        <div id="solution-box">
            <b id="sol-hero" style="font-size: 18px;">🔬 Разбор:</b><br>
            <div id="solution-text" style="margin-top: 10px;"></div>
        </div>
        <button id="next-btn" class="btn-ok" style="display:none; margin-top:20px;">ДАЛЬШЕ ➡️</button>
    </div>

    <div id="final" class="card">
        <h2 id="final-status">Итоги</h2>
        <div id="stats" class="theory-box" style="text-align: center; font-size: 20px;"></div>
        <div id="retry-area"></div>
        <button class="btn-gray" onclick="showMainMenu()">В МЕНЮ</button>
        <button onclick="showShop()" style="background: var(--gold); color: #000; margin-top: 10px;">🛒 В МАГАЗИН</button>
    </div>

    <script>
    // ССЫЛКА НА ТАБЛИЦУ
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSyYBIArwn-npZYPgPwIazi4HzVR4DzusAc1VvJ_eQklHkYBElS7r0pwZzx-Pe2tPnoop9sFBpFMZWj/pub?output=csv";

    try {
        const tg = window.Telegram.WebApp; 
        tg.expand();
        
        let state = { lives: 5, coins: 0, currentIdx: 0, questions: [], errors: [] };
        let remoteDatabase = []; 
        let currentGrade = "5";

        window.renderMath = function(text, element, isDisplay = false) {
            try {
                element.innerHTML = text.replace(/\$([^$]+)\$/g, (match, formula) => {
                    return katex.renderToString(formula, { throwOnError: false, displayMode: isDisplay });
                });
            } catch (e) { element.innerHTML = text; }
        };

        const data = "5": {
                name: "5 Класс", hero: "🐱🚀", desc: "Натуральные числа и основы",
                theory: [
                    { title: "Натуральные числа и действия", text: "<b>Округление:</b> Если следующая цифра $5, 6, 7, 8, 9$ — округляем в большую сторону; если $0, 1, 2, 3, 4$ — в меньшую.<br><b>Порядок действий:</b> Сначала скобки, затем умножение/деление, в конце — сложение/вычитание.<br><b>Признаки делимости:</b><br>• На $2$: четное.<br>• На $3$ и $9$: сумма цифр делится на $3$ или $9$.<br>• На $5$: оканчивается на $0$ или $5$." },
                    { title: "Обыкновенные дроби", text: "<b>Сравнение:</b> Чтобы сравнить дроби с разными знаменателями, их нужно привести к общему знаменателю.<br><b>Умножение:</b> Числитель $\\cdot$ числитель, знаменатель $\\cdot$ знаменатель.<br><b>Деление:</b> Первую дробь оставляем, вторую переворачиваем и умножаем." }
                ]
            },
            "6": {
                name: "6 Класс", hero: "🤖🛰️", desc: "Дроби и пропорции",
                theory: [
                    { title: "Десятичные дроби", text: "<b>Запятая:</b><br>• Умножение: считаем общее кол-во знаков после запятой в обоих числах и отделяем столько же в ответе.<br>• Деление на $10, 100, 1000$: переносим запятую <b>влево</b> на $1, 2, 3$ знака." },
                    { title: "Пропорции и Проценты", text: "<b>Основное свойство:</b> В пропорции $\\frac{a}{b} = \\frac{c}{d}$ произведение крайних членов равно произведению средних ($ad = bc$).<br><b>Нахождение процента:</b> Чтобы найти $p\\%$ от числа $A$, нужно $A \\cdot \\frac{p}{100}$." }
                ]
            },
            "7": {
                name: "7 Класс", hero: "👩🏻‍🎤⚡", desc: "Алгебра и ФСУ",
                theory: [
                    { title: "Степени", text: "<b>Свойства:</b><br>• $a^n \\cdot a^m = a^{n+m}$<br>• $(a^n)^m = a^{nm}$<br>• $(ab)^n = a^n b^n$<br>• $a^{-n} = \\frac{1}{a^n}$" },
                    { title: "Формулы ФСУ", text: "• $(a \\pm b)^2 = a^2 \\pm 2ab + b^2$<br>• $a^2 - b^2 = (a - b)(a + b)$<br>• $a^3 \\pm b^3 = (a \\pm b)(a^2 \\mp ab + b^2)$" }
                ]
            },
            "8": {
                name: "8 КЛАСС", hero: "📟💀", desc: "Уравнения и Геометрия",
                theory: [
                    { title: "Квадратные уравнения", text: "<b>Дискриминант:</b> $D = b^2 - 4ac$.<br>• $D > 0$: два корня $x = \\frac{-b \\pm \\sqrt{D}}{2a}$.<br>• $D = 0$: один корень $x = \\frac{-b}{2a}$.<br>• $D < 0$: корней нет.<br><b>Виет:</b> Для $x^2 + px + q = 0$ сумма корней равна $-p$, произведение равно $q$." },
                    { title: "Неравенства и Геометрия", text: "<b>Неравенства:</b> При умножении/делении на отрицательное число знак меняется!<br><b>Прямоугольный тр-к:</b> $\\sin \\alpha = \\frac{\\text{противолеж.}}{\\text{гипотенуза}}$, $\\cos \\alpha = \\frac{\\text{прилеж.}}{\\text{гипотенуза}}$." }
                ]
            },
            "9": {
                name: "9 Класс: ОГЭ", hero: "👨‍🏫", desc: "Прогрессии и Окружность",
                theory: [
                    { title: "Прогрессии", text: "<b>Арифметическая:</b> $a_n = a_1 + d(n - 1)$; $S_n = \\frac{a_1 + a_n}{2} \\cdot n$.<br><b>Геометрическая:</b> $b_n = b_1 \\cdot q^{n-1}$; $S_n = \\frac{b_1(q^n - 1)}{q - 1}$." },
                    { title: "Геометрия и Вероятность", text: "<b>Окружность:</b> Радиус в точку касания $\\perp$ касательной. Отрезки хорд: $a \\cdot b = c \\cdot d$. Вписанный угол = половине дуги.<br><b>Вероятность:</b> $P = \\frac{m}{n}$." }
                ]
            },
            "10": {
                name: "10 Класс: PRO", hero: "☕🌿", desc: "Тригонометрия и Логарифмы",
                theory: [
                    { title: "Тригонометрия", text: "<b>Основные:</b> $\\sin^2 \\alpha + \\cos^2 \\alpha = 1$.<br><b>Двойной угол:</b> $\\sin 2\\alpha = 2 \\sin \\alpha \\cos \\alpha$, $\\cos 2\\alpha = \\cos^2 \\alpha - \\sin^2 \\alpha$.<br><b>Сложение:</b> $\\sin(\\alpha \\pm \\beta) = \\sin \\alpha \\cos \\beta \\pm \\cos \\alpha \\sin \\beta$." },
                    { title: "Логарифмы", text: "• $\\log_a (bc) = \\log_a b + \\log_a c$<br>• $\\log_a \\frac{b}{c} = \\log_a b - \\log_a c$<br>• $\\log_a b^n = n \\log_a b$<br>• $\\log_a b = \\frac{\\log_c b}{\\log_c a}$" }
                ]
            },
            "11": {
                name: "11 Класс: ЕГЭ", hero: "📊🔥", desc: "Производная и Стереометрия",
                theory: [
                    { title: "Производная", text: "<b>Правила:</b> $(uv)' = u'v + uv'$, $(u/v)' = \\frac{u'v - uv'}{v^2}$.<br><b>Геом. смысл:</b> $f'(x_0) = \\text{tg} \\alpha = k$.<br><b>Исследование:</b> Смена знака $f'(x)$ с $+$ на $-$ — точка максимума." },
                    { title: "Стереометрия и Экономика", text: "<b>Призма:</b> $V = S_{осн} h$. <b>Пирамида:</b> $V = \\frac{1}{3} S_{осн} h$. <b>Шар:</b> $V = \\frac{4}{3} \\pi R^3$.<br><b>Экономика:</b> Аннуитет $S = x \\cdot \\frac{(1+k)^n - 1}{k(1+k)^n}$." }
                ]
            }
        };
        
        // --- ЛОГИКА ПРОФИЛЯ ---
       window.setGradeFromBtn = (g) => { document.getElementById('user-grade-input').value = g; };

        window.saveFullProfile = function() {
            const name = document.getElementById('user-name-input').value.trim();
            const grade = document.getElementById('user-grade-input').value;
            if(!name || !grade) return alert("Заполни все поля!");
            state.name = name;
            localStorage.setItem('math_name', name);
            switchGrade(grade);
        };

        window.switchGrade = (g) => {
            currentGrade = g; hideAll();
            document.body.className = "grade-" + g;
            const cur = data[g];
            document.getElementById('grade-title').innerText = cur.name;
            document.getElementById('hero').innerText = cur.hero;
            document.getElementById('grade-desc').innerText = `Привет, ${state.name}! ${cur.desc}`;
            document.getElementById('hud').style.display = 'flex';
            showMainMenu();
        };

        async function loadRemoteData() {
            try {
                const res = await fetch(SHEET_CSV_URL);
                const text = await res.text();
                const rows = text.split('\n').slice(1);
                remoteDatabase = rows.map(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if(c.length < 7) return null;
                    const opt = [c[2], c[3], c[4], c[5]].map(s => s?.replace(/"/g, '').trim());
                    let cor = c[6]?.trim();
                    if(cor.includes("Вариант 1")) cor = opt[0];
                    else if(cor.includes("Вариант 2")) cor = opt[1];
                    else if(cor.includes("Вариант 3")) cor = opt[2];
                    else if(cor.includes("Вариант 4")) cor = opt[3];
                    return { grade: c[0].trim(), q: c[1].replace(/"/g, ''), opt, cor, sol: c[7] };
                }).filter(i => i);
            } catch(e) { console.error(e); }
        }

        window.startPractice = async () => {
            hideAll(); state.lives = 5; state.coins = 0; state.currentIdx = 0;
            if (remoteDatabase.length === 0) await loadRemoteData();
            let pool = remoteDatabase.filter(i => i.grade == currentGrade);
            if(!pool.length) return alert("Задания еще грузятся...");
            state.questions = pool.sort(() => Math.random()-0.5).slice(0, 10);
            updateHUD(); document.getElementById('quiz').classList.add('active'); renderQ();
        };

        window.renderQ = () => {
            if(state.lives <= 0) return finish(false);
            if(state.currentIdx >= state.questions.length) return finish(true);
            const q = state.questions[state.currentIdx];
            document.getElementById('progress').innerText = `Вопрос ${state.currentIdx+1}/10`;
            renderMath(q.q, document.getElementById('q-text'));
            const optCont = document.getElementById('options'); optCont.innerHTML = "";
            q.opt.forEach(o => {
                const b = document.createElement('button');
                renderMath(o, b);
                b.onclick = () => {
                    if(o === q.cor) { b.style.background="#32CD32"; state.coins+=5; }
                    else { b.style.background="#FF4500"; state.lives--; }
                    updateHUD(); renderMath(q.sol, document.getElementById('solution-text'));
                    document.getElementById('solution-box').style.display="block";
                    document.getElementById('next-btn').style.display="block";
                    optCont.querySelectorAll('button').forEach(btn => btn.disabled=true);
                };
                optCont.appendChild(b);
            });
            document.getElementById('next-btn').style.display="none"; document.getElementById('solution-box').style.display="none";
        };

        document.getElementById('next-btn').onclick = () => { state.currentIdx++; renderQ(); };
        window.finish = (win) => { hideAll(); document.getElementById('final').classList.add('active'); document.getElementById('final-status').innerText = win ? "ПОБЕДА!" : "НЕУДАЧА"; document.getElementById('stats').innerText = `Монеты: ${state.coins}`; };
        window.hideAll = () => document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        window.showMainMenu = () => { hideAll(); document.getElementById('main-menu').classList.add('active'); };
        window.showGradeSelector = () => { hideAll(); document.getElementById('hud').style.display='none'; document.getElementById('grade-selector').classList.add('active'); };
        window.updateHUD = () => { document.getElementById('lives').innerText = state.lives; document.getElementById('coins').innerText = state.coins; };

        window.showTheoryMenu = () => {
            hideAll(); const list = document.getElementById('theory-list'); list.innerHTML = "";
            data[currentGrade].theory.forEach(t => {
                const b = document.createElement('button'); b.innerText = t.title;
                b.onclick = () => { hideAll(); document.getElementById('view-title').innerText = t.title; renderMath(t.text, document.getElementById('view-content')); document.getElementById('theory-view').classList.add('active'); };
                list.appendChild(b);
            });
            document.getElementById('theory-menu').classList.add('active');
        };

        function initApp() {
            const saved = localStorage.getItem('math_name');
            hideAll();
            if(!saved) document.getElementById('welcome-screen').classList.add('active');
            else { state.name = saved; showGradeSelector(); }
            loadRemoteData();
        }
        initApp();
        setInterval(() => {
            const c = document.getElementById('floating-container'); const d = document.createElement('div');
            d.className = 'floater'; d.innerText = "⚡"; d.style.left = Math.random()*95+"vw";
            d.style.animationDuration = (6+Math.random()*6)+"s"; c.appendChild(d);
            setTimeout(() => d.remove(), 10000);
        }, 2000);

    } catch (e) { document.getElementById('error-msg').innerText = e; }
    </script>
</body>
</html>
