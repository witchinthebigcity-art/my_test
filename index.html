<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Universe: Fixed Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Nunito:wght@700;900&family=Roboto:wght@400;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            --sky: #87CEEB; --lime: #32CD32; --orange: #FF8C00;
            --turq: #00CED1; --purple: #4B0082; --coral: #FF7F50;
            --neon: #00ff41; --cyber-blue: #0d0221; --gold: #FFD700; --red: #FF4500;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; padding: 20px; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden; position: relative; transition: 0.5s;
            font-family: 'Roboto', sans-serif;
        }

        /* ТЕМЫ */
        body.grade-5 { background: linear-gradient(180deg, var(--sky) 0%, #E0F7FA 100%); font-family: 'Nunito', sans-serif; --acc: var(--orange); --btn: var(--lime); }
        body.grade-6 { background: #1A1A2E; font-family: 'Montserrat', sans-serif; color: #E1E8F0; --acc: var(--coral); --btn: var(--turq); }
        body.grade-7 { background: var(--cyber-blue); color: var(--neon); font-family: 'Roboto', sans-serif; --acc: #9d00ff; --btn: var(--neon); }
        body.grade-7 h2 { font-family: 'Orbitron', sans-serif; text-transform: uppercase; }

        /* HUD */
        #hud { position: fixed; top: 15px; width: 90%; max-width: 400px; display: flex; justify-content: space-between; z-index: 100; }
        .hud-item { background: white; padding: 10px 18px; border-radius: 25px; font-weight: 900; color: #333; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        body.grade-7 .hud-item { background: #1a1a1a; color: var(--neon); border: 1px solid var(--neon); }

        /* КАРТОЧКИ */
        .card { 
            background: white; border-radius: 35px; padding: 30px;
            box-shadow: 0 12px 0 rgba(0,0,0,0.1); width: 100%; max-width: 440px;
            text-align: center; position: relative; z-index: 10; display: none;
            max-height: 82vh; overflow-y: auto; border: 4px solid #333; color: #333;
        }
        body.grade-6 .card { background: rgba(26, 26, 46, 0.98); border-color: var(--turq); color: white; }
        body.grade-7 .card { background: rgba(13, 2, 33, 0.95); border-color: var(--neon); color: var(--neon); box-shadow: 0 0 25px var(--neon); }

        .active { display: block; animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from {transform: scale(0.8); opacity:0;} to {transform: scale(1); opacity:1;} }

        /* КНОПКИ */
        button { 
            font-family: inherit; border: none; padding: 18px 10px; border-radius: 20px; 
            width: 100%; margin: 10px 0; font-weight: 900; font-size: 18px; cursor: pointer; 
            transition: 0.2s; box-shadow: 0 6px 0 rgba(0,0,0,0.2);
            display: flex; align-items: center; justify-content: center;
        }
        button:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }
        .btn-acc { background: var(--acc); color: white; }
        .btn-ok { background: var(--btn); color: white; }

        /* ТЕОРИЯ И РАЗБОР */
        .theory-box { text-align: left; padding: 20px; border-radius: 25px; border: 3px dashed var(--acc); margin-bottom: 15px; font-size: 17px; line-height: 1.5; }
        #solution-box { display: none; padding: 20px; border-radius: 25px; margin-top: 20px; text-align: left; border: 3px solid var(--btn); background: rgba(0,0,0,0.05); }

        /* ВЫРАВНИВАНИЕ KATEX ВНУТРИ ТЕКСТА */
        .katex-display { margin: 10px 0 !important; }
        .katex { font-size: 1.1em !important; }
        
        #floating-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .floater { position: absolute; bottom: -100px; opacity: 0.3; animation: floatUp linear forwards; }
        @keyframes floatUp { from { transform: translateY(0); } to { transform: translateY(-120vh); } }
    </style>
</head>
<body class="grade-5">

    <div id="hud">
        <div class="hud-item">❤️ <span id="lives">5</span></div>
        <div class="hud-item">💰 <span id="coins">0</span></div>
    </div>

    <div id="floating-container"></div>

    <div id="main-menu" class="card active">
        <div id="hero" style="font-size: 75px; margin-bottom: 10px;">🐱🚀</div>
        <h2 id="grade-title" style="font-size: 28px; margin: 10px 0;">Математика</h2>
        <button class="btn-acc" onclick="showTheoryMenu()">📖 База Знаний</button>
        <button class="btn-ok" onclick="startPractice()">🚀 Начать Тест</button>
        <button onclick="showShop()" style="background: var(--gold); color: #000;">🛒 Магазин</button>
    </div>

    <div id="theory-menu" class="card">
        <h3>Модули обучения:</h3>
        <div id="theory-list"></div>
        <button onclick="showMainMenu()" style="background:#6c757d; color:white;">⬅️ Назад</button>
    </div>

    <div id="theory-view" class="card">
        <h3 id="view-title" style="font-size: 22px; color: var(--acc);"></h3>
        <div id="view-content" class="theory-box"></div>
        <button class="btn-acc" onclick="showTheoryMenu()">Понятно!</button>
    </div>

    <div id="shop" class="card">
        <h2 style="color: var(--gold);">🛒 Магазин</h2>
        <p>Синхронизация ресурсов...</p>
        <button onclick="showMainMenu()" style="background:#6c757d; color:white; margin-top: 15px;">⬅️ Назад</button>
    </div>

    <div id="quiz" class="card">
        <div id="progress" style="font-size: 15px; margin-bottom: 15px; font-weight: 900; opacity: 0.6;"></div>
        <div id="q-text" style="font-size: 20px; font-weight: 700; margin-bottom: 25px; line-height: 1.4;"></div>
        <div id="options"></div>
        <div id="solution-box">
            <b style="font-size: 18px;">🔬 Разбор:</b><br>
            <div id="solution-text" style="margin-top: 10px;"></div>
        </div>
        <button id="next-btn" class="btn-ok" style="display:none; margin-top:20px;">Дальше ➡️</button>
    </div>

    <div id="final" class="card">
        <h2 id="final-status">Итоги Миссии</h2>
        <div id="stats" class="theory-box" style="text-align: center; font-size: 20px;"></div>
        <div id="retry-area"></div>
        <button class="btn-ok" onclick="showMainMenu()">В меню</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        let state = { lives: 5, coins: 0, currentIdx: 0, questions: [], errorsByBlock: {} };

        // Рендерер математики
        function renderMath(text, element, isDisplay = false) {
            try {
                if (text.includes('$')) {
                    element.innerHTML = text.replace(/\$([^$]+)\$/g, (match, formula) => {
                        return katex.renderToString(formula, { throwOnError: false });
                    });
                } else {
                    katex.render(text, element, { 
                        displayMode: isDisplay, 
                        throwOnError: false 
                    });
                }
            } catch (e) { element.innerText = text; }
        }

        const data = {
            "5": {
                name: "5 Класс", hero: "🐱🚀",
                theory: [
                    { 
                        title: "1. Натуральные числа", 
                        text: "Натуральные числа — это те, что мы используем для счета. Ноль не является натуральным числом. <br><br><b>Главные свойства:</b><br>• Прибавление нуля не меняет число: $a + 0 = a$<br>• Умножение на ноль всегда дает ноль: $a \\cdot 0 = 0$<br><br><b>Метод Гаусса</b> позволяет мгновенно складывать длинные ряды чисел: $1 + 2 + \\dots + n = \\frac{n(n+1)}{2}$." 
                    },
                    { 
                        title: "2. Умножение и уравнения", 
                        text: "<b>Распределительное свойство</b> (метод «фонтанчика») помогает раскрывать скобки: $a \\cdot (b + c) = ab + ac$.<br><br><b>Степень числа</b> показывает, сколько раз число умножили само на себя:<br>• Квадрат ($a^2$) — 2 раза<br>• Куб ($a^3$) — 3 раза.<br><br>В уравнениях $x$ — это неизвестная часть, которую мы находим через обратные действия." 
                    },
                    { 
                        title: "3. Геометрия и измерения", 
                        text: "<b>Периметр ($P$)</b> — это общая длина границы фигуры: $P = 2(a + b)$.<br><b>Площадь ($S$)</b> показывает место на плоскости: $S = a \\cdot b$.<br><b>Объем ($V$)</b> измеряет вместимость: $V = a \\cdot b \\cdot c$.<br><br>Важно: при переходе между единицами площади коэффициент возводится в квадрат ($10^2 = 100$)." 
                    },
                    { 
                        title: "4. Обыкновенные дроби", 
                        text: "Складываем дроби с одинаковыми знаменателями: $\\frac{a}{c} + \\frac{b}{c} = \\frac{a+b}{c}$.<br><br>Для сравнения используем <b>метод «бабочки»</b> — перемножаем крест-накраст: $\\frac{3}{5}$ vs $\\frac{4}{7} \\implies 21 > 20$." 
                    },
                    { 
                        title: "5. Десятичные дроби", 
                        text: "Десятичные дроби — это удобная запись долей со знаменателями 10, 100, 1000.<br><br>• При умножении на 10, 100 запятая прыгает <b>вправо</b>: $1,234 \\cdot 100 = 123,4$.<br>• <b>Среднее арифметическое</b>: $\\text{Среднее} = \\frac{\\text{сумма}}{n}$." 
                    }
                ],
                questions: [
                    { q: "В одной книге 126 страниц, что в 3 раза больше, чем в другой. Сколько страниц во второй книге?", opt: ["42", "378", "123", "40"], cor: "42", sol: "$126 : 3 = 42$.", bId: "Натуральные числа" },
                    { q: "Найдите значение выражения: $45 + 15 \\cdot (102 - 92)$", opt: ["195", "600", "150", "160"], cor: "195", sol: "$102 - 92 = 10$; $15 \\cdot 10 = 150$; $45 + 150 = 195$.", bId: "Умножение и уравнения" },
                    { q: "Ширина прямоугольника 8 см, а длина на 4 см больше. Чему равен периметр этого прямоугольника?", opt: ["40 см", "24 см", "96 см", "32 см"], cor: "40 см", sol: "Длина: $8 + 4 = 12$. Периметр: $(8 + 12) \\cdot 2 = 40$.", bId: "Геометрия и измерения" },
                    { q: "Какую часть метра составляют 35 сантиметров?", opt: ["\\dfrac{35}{100}", "\\dfrac{35}{10}", "\\dfrac{100}{35}", "\\dfrac{3}{5}"], cor: "\\dfrac{35}{100}", sol: "В 1 метре 100 см, значит $\\frac{35}{100}$.", bId: "Обыкновенные дроби" },
                    { q: "Вычислите: $3,27 + 12,5$", opt: ["15,77", "15,32", "4,52", "157,7"], cor: "15,77", sol: "Записываем запятую под запятой: $3,27 + 12,50 = 15,77$.", bId: "Десятичные дроби" },
                    { q: "Решите уравнение: $x - 14,8 = 5,2$", opt: ["20", "9,6", "20,10", "19,6"], cor: "20", sol: "$x = 5,2 + 14,8 = 20$.", bId: "Умножение и уравнения" },
                    { q: "Округлите число 452,38 до целых.", opt: ["452", "453", "450", "452,4"], cor: "452", sol: "Первая цифра после запятой 3 (< 5), округляем в меньшую сторону.", bId: "Десятичные дроби" },
                    { q: "Площадь квадрата равна 64 $см^2$. Найдите его сторону.", opt: ["8 см", "16 см", "32 см", "4 см"], cor: "8 см", sol: "$8 \\cdot 8 = 64$.", bId: "Геометрия и измерения" },
                    { q: "В классе 25 учеников. 40% из них — девочки. Сколько девочек в классе?", opt: ["10", "15", "4", "5"], cor: "10", sol: "$25 \\cdot 0,4 = 10$.", bId: "Десятичные дроби" },
                    { q: "Чему равен объем прямоугольного параллелепипеда с измерениями 2 см, 5 см и 10 см?", opt: ["100 $см^3$", "17 $см^3$", "34 $см^3$", "50 $см^3$"], cor: "100 $см^3$", sol: "$V = 2 \\cdot 5 \\cdot 10 = 100$.", bId: "Геометрия и измерения" }
                ]
            },
            "6": {
                name: "6 Класс", hero: "🤖🛰️",
                theory: [
                    { 
                        title: "1. Теория чисел и делимость", 
                        text: "Любое составное число можно разложить на произведение простых множителей: $n = p_1^{a} \\cdot p_2^{b} \\dots$.<br>Это «ДНК» числа, которое показывает его структуру. Разложение помогает мгновенно находить НОД и НОК." 
                    },
                    { 
                        title: "2. Сложение и вычитание дробей", 
                        text: "<b>Главное правило:</b> нельзя складывать дроби с разными знаменателями!<br>$\\frac{a}{b} \\pm \\frac{c}{d} = \\frac{a \\cdot d \\pm c \\cdot b}{b \\cdot d}$<br>Сначала приводим к общему знаменателю (ищем НОК), затем считаем." 
                    },
                    { 
                        title: "3. Умножение и деление дробей", 
                        text: "• <b>Умножение:</b> перемножаем числители и знаменатели отдельно.<br>• <b>Деление:</b> $\\frac{a}{b} : \\frac{c}{d} = \\frac{a}{b} \\cdot \\frac{d}{c}$ (вторую дробь переворачиваем).<br>Всегда сокращай дроби до умножения!" 
                    },
                    { 
                        title: "4. Пропорции и масштаб", 
                        text: "Основное свойство пропорции (правило «креста»):<br>$\\frac{a}{b} = \\frac{c}{d} \\iff a \\cdot d = b \\cdot c$.<br>Если неизвестен один член, перемножаем диагональ и делим на оставшееся." 
                    },
                    { 
                        title: "5. Отрицательные числа и модуль", 
                        text: "<b>Модуль ($|a|$)</b> — это расстояние от нуля, оно всегда положительно.<br><b>Правило знаков:</b><br>• Одинаковые знаки $\\to$ плюс<br>• Разные знаки $\\to$ минус.<br>При сложении чисел с разными знаками вычитаем из большего модуля меньший." 
                    },
                    { 
                        title: "6. Раскрытие скобок", 
                        text: "Если перед скобкой минус, знаки внутри меняются:<br>$-(a - b + c) = -a + b - c$.<br><b>Подобные слагаемые</b> — выражения с одинаковой буквой. Складываем коэффициенты, букву оставляем." 
                    }
                ],
                questions: [
                    { q: "Найдите НОК (наименьшее общее кратное) чисел 12 и 15:", opt: ["3", "180", "60", "30"], cor: "60", sol: "$60$ делится на $12$ ($5$) и на $15$ ($4$).", bId: "Теория чисел и делимость" },
                    { q: "Решите пропорцию: $12 : x = 4 : 5$", opt: ["15", "9,6", "10", "2,4"], cor: "15", sol: "$4x = 12 \\cdot 5 \\implies 4x = 60 \\implies x = 15$.", bId: "Пропорции и масштаб" },
                    { q: "Расстояние на карте 4 см. Масштаб 1 : 500 000. Реальное расстояние?", opt: ["2 км", "20 км", "200 км", "12,5 км"], cor: "20 км", sol: "$4 \\cdot 500\\,000 = 2\\,000\\,000$ см = $20$ км.", bId: "Пропорции и масштаб" },
                    { q: "Найдите длину окружности, если $R=5$ см ($\\pi \\approx 3,14$):", opt: ["15,7 см", "31,4 см", "78,5 см", "314 см"], cor: "31,4 см", sol: "$C = 2\\pi R = 2 \\cdot 3,14 \\cdot 5 = 31,4$.", bId: "Пропорции и масштаб" },
                    { q: "Вычислите: $-18 + (-7) - (-10)$", opt: ["-35", "-15", "-25", "15"], cor: "-15", sol: "$-18 - 7 + 10 = -25 + 10 = -15$.", bId: "Отрицательные числа и модуль" },
                    { q: "Найдите значение: $(-2,5) \\cdot (-4) \\cdot 0,3$", opt: ["3", "-3", "0,3", "-30"], cor: "3", sol: "$10 \\cdot 0,3 = 3$.", bId: "Отрицательные числа и модуль" },
                    { q: "В какой четверти точка $A(-5; 8)$?", opt: ["I", "II", "III", "IV"], cor: "II", sol: "$x < 0, y > 0 \\implies$ II четверть.", bId: "Пропорции и масштаб" },
                    { q: "Упростите: $3(x - 2) - 2(x - 3)$", opt: ["x - 12", "5x", "x", "x + 12"], cor: "x", sol: "$3x - 6 - 2x + 6 = x$.", bId: "Раскрытие скобок и подобные" },
                    { q: "Решите уравнение: $5x - 12 = 2x + 6$", opt: ["x = 2", "x = 6", "x = -2", "x = 18"], cor: "x = 6", sol: "$3x = 18 \\implies x = 6$.", bId: "Раскрытие скобок и подобные" },
                    { q: "Чему равно значение $|-12,4| + |3,6|$?", opt: ["8,8", "16", "-8,8", "-16"], cor: "16", sol: "$12,4 + 3,6 = 16$.", bId: "Отрицательные числа и модуль" }
                ]
            },
            "7": {
                name: "7 Класс", hero: "👩🏻‍🎤⚡",
                theory: [
                    { title: "⚡ Свойства степеней", text: "$a^n \\cdot a^m = a^{n+m}$" },
                    { title: "📈 Линейная функция", text: "$y = kx + b$" }
                ],
                questions: [
                    { q: "Упростите: $2(3x - 1) - 4(x + 2)$", opt: ["2x - 10", "2x + 6", "10x - 10", "2x - 3"], cor: "2x - 10", sol: "$6x - 2 - 4x - 8 = 2x - 10$", bId: "Алгебра" },
                    { q: "Вычислите: $\\frac{(a^3)^4}{a^{10}}$", opt: ["a^7", "a^2", "a^{22}", "a^{12}"], cor: "a^2", sol: "$a^{12} : a^{10} = a^2$", bId: "Свойства степеней" },
                    { q: "Представьте как многочлен: $(x - 3)(x + 5)$", opt: ["x^2 - 15", "x^2 - 2x - 15", "x^2 + 8x - 15", "x^2 + 2x - 15"], cor: "x^2 + 2x - 15", sol: "$x^2 + 5x - 3x - 15 = x^2 + 2x - 15$", bId: "Алгебра" },
                    { q: "Решите систему: $\\begin{cases} x + y = 10 \\\\ x - y = 4 \\end{cases}$", opt: ["(6; 4)", "(5; 5)", "(7; 3)", "(8; 2)"], cor: "(7; 3)", sol: "Сложим: $2x = 14 \\implies x=7$. Тогда $y=3$.", bId: "Системы" },
                    { q: "Разложите: $16 - 9y^2$", opt: ["(4 - 3y)(4 + 3y)", "(4 - 3y)^2", "(8 - 3y)(8 + 3y)", "(16 - 9y)(16 + 9y)"], cor: "(4 - 3y)(4 + 3y)", sol: "$4^2 - (3y)^2 = (4-3y)(4+3y)$", bId: "ФСУ" },
                    { q: "y = 3x + b через A(1; 5). Найти b:", opt: ["5", "2", "8", "-2"], cor: "2", sol: "$5 = 3 \\cdot 1 + b \\implies b=2$", bId: "Функция" },
                    { q: "Решите уравнение: $5x - 4 = 3x + 8$", opt: ["2", "4", "6", "-2"], cor: "6", sol: "$2x = 12 \\implies x = 6$", bId: "Алгебра" },
                    { q: "Угол смежный с углом 50$^\\circ$:", opt: ["40$^\\circ$", "130$^\\circ$", "50$^\\circ$", "180$^\\circ$"], cor: "130$^\\circ$", sol: "$180 - 50 = 130$", bId: "Геометрия" },
                    { q: "Равнобедр. треуг. Угол при осн. 70$^\\circ$. Вершина?", opt: ["70$^\\circ$", "110$^\\circ$", "55$^\\circ$", "40$^\\circ$"], cor: "40$^\\circ$", sol: "$180 - 2 \\cdot 70 = 40$", bId: "Геометрия" },
                    { q: "Параллельные прямые. Накрест лежащий к 60$^\\circ$:", opt: ["120$^\\circ$", "60$^\\circ$", "30$^\\circ$", "90$^\\circ$"], cor: "60$^\\circ$", sol: "Углы равны.", bId: "Геометрия" }
                ]
            }
        };

        const params = new URLSearchParams(window.location.search);
        const grade = params.get('grade') || "5";
        const curData = data[grade] || data["5"];

        function init() {
            document.body.className = "grade-" + grade;
            document.getElementById('grade-title').innerText = curData.name;
            document.getElementById('hero').innerText = curData.hero;
            showMainMenu();
            spawnFloating();
        }

        function showMainMenu() { hide(); document.getElementById('main-menu').classList.add('active'); }
        function showShop() { hide(); document.getElementById('shop').classList.add('active'); }
        function hide() { document.querySelectorAll('.card').forEach(c => c.classList.remove('active')); }

        function showTheoryMenu() {
            hide();
            const list = document.getElementById('theory-list');
            list.innerHTML = "";
            curData.theory.forEach((t, i) => {
                const b = document.createElement('button');
                b.className = "btn-ok"; b.style.background = "#eee"; b.style.color = "#333";
                b.innerText = t.title;
                b.onclick = () => {
                    hide();
                    document.getElementById('view-title').innerText = t.title;
                    const contentArea = document.getElementById('view-content');
                    contentArea.innerHTML = "";
                    renderMath(t.text, contentArea);
                    document.getElementById('theory-view').classList.add('active');
                };
                list.appendChild(b);
            });
            document.getElementById('theory-menu').classList.add('active');
        }

        function startPractice(filterBlock = null) {
            hide();
            state.lives = 5; state.coins = 0; state.currentIdx = 0; state.errorsByBlock = {};
            state.questions = filterBlock ? curData.questions.filter(q => q.bId === filterBlock) : [...curData.questions].sort(() => Math.random() - 0.5);
            updateHUD();
            document.getElementById('quiz').classList.add('active');
            renderQ();
        }

        function updateHUD() {
            document.getElementById('lives').innerText = state.lives;
            document.getElementById('coins').innerText = state.coins;
        }

        function renderQ() {
            if(state.lives <= 0) { finish(false); return; }
            const q = state.questions[state.currentIdx];
            document.getElementById('progress').innerText = `Задание ${state.currentIdx + 1} / ${state.questions.length}`;
            
            const qContainer = document.getElementById('q-text');
            qContainer.innerHTML = "";
            renderMath(q.q, qContainer, q.q.includes('begin{cases}'));

            document.getElementById('solution-box').style.display = "none";
            document.getElementById('next-btn').style.display = "none";
            
            const optCont = document.getElementById('options');
            optCont.innerHTML = "";
            q.opt.forEach(o => {
                const b = document.createElement('button');
                renderMath(o, b);
                b.onclick = () => {
                    const all = optCont.querySelectorAll('button');
                    all.forEach(btn => btn.disabled = true);
                    if(o === q.cor) {
                        b.style.background = "#32CD32"; b.style.color = "white"; state.coins += 5;
                    } else {
                        b.style.background = "#FF4500"; b.style.color = "white"; state.lives--;
                        state.errorsByBlock[q.bId] = (state.errorsByBlock[q.bId] || 0) + 1;
                        all.forEach(btn => { 
                            if(btn.innerText === q.cor || btn.textContent === q.cor) {
                                btn.style.background = "#32CD32"; btn.style.color = "white"; 
                            } 
                        });
                    }
                    updateHUD();
                    const solArea = document.getElementById('solution-text');
                    solArea.innerHTML = "";
                    renderMath(q.sol, solArea);
                    document.getElementById('solution-box').style.display = "block";
                    document.getElementById('next-btn').style.display = "block";
                };
                optCont.appendChild(b);
            });
        }

        document.getElementById('next-btn').onclick = () => {
            state.currentIdx++;
            if(state.currentIdx < state.questions.length && state.lives > 0) renderQ();
            else finish(state.lives > 0);
        };

        function finish(win) {
            hide();
            document.getElementById('final').classList.add('active');
            const stats = document.getElementById('stats');
            stats.innerHTML = `<h3>${win ? 'Миссия Выполнена!' : 'Жизни закончились!'}</h3><p>Монеты: ${state.coins} 💰</p>`;
            const retryArea = document.getElementById('retry-area');
            retryArea.innerHTML = "";
            let failedBlocks = Object.keys(state.errorsByBlock).filter(b => state.errorsByBlock[b] >= 1);
            if(failedBlocks.length > 0) {
                failedBlocks.forEach(b => {
                    const rb = document.createElement('button');
                    rb.className = "btn-acc"; rb.innerText = `Пересдать: ${b}`;
                    rb.onclick = () => startPractice(b);
                    retryArea.appendChild(rb);
                });
            }
        }

        function spawn() {
            const c = document.getElementById('floating-container');
            const d = document.createElement('div');
            d.className = 'floater';
            const icons = grade === "5" ? ["🐱","⭐","📐"] : (grade === "6" ? ["🤖","🛰️","💠"] : ["⚡","🎤","💎"]);
            d.innerText = icons[Math.floor(Math.random()*icons.length)];
            d.style.left = Math.random()*95 + "vw";
            d.style.fontSize = (25+Math.random()*25) + "px";
            d.style.animationDuration = (8+Math.random()*8) + "s";
            c.appendChild(d);
            setTimeout(() => d.remove(), 12000);
        }
        function spawnFloating() { setInterval(spawn, 1500); }

        init();
    </script>
</body>
</html>
