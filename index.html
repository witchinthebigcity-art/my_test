</head>
<body>
    <div id="quiz-container">
        <h1 id="grade-title">Загрузка...</h1>
        <div class="card">
            <h2 id="question-text">Вопрос появится здесь</h2>
            <div id="options-container"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // --- ТВОИ ЗАДАНИЯ ТУТ ---
        const allQuestions = {
"5": [
    { 
        q: "Как будет выглядеть число один миллион двадцать четыре тысячи сто сорок семь, если его записать цифрами?", 
        options: ["1 204 147", "1 024 147", "1 024 047", "24 147"], 
        correct: "1 024 147" 
    }
],
            "9": [
                { q: "Вопрос для 9 класса: Сколько планет в Солнечной системе?", options: ["7", "8", "9"], correct: "8" },
                { q: "9 класс: Корень из 81?", options: ["7", "8", "9"], correct: "9" }
            ],
            "10": [
                { q: "Вопрос для 10 класса: Кто написал 'Войну и мир'?", options: ["Толстой", "Чехов", "Пушкин"], correct: "Толстой" }
            ],
            "11": [
                { q: "Вопрос для 11 класса: Чему равна производная sin(x)?", options: ["cos(x)", "-cos(x)", "tg(x)"], correct: "cos(x)" }
            ]
        };

        // Получаем класс из ссылки
        const urlParams = new URLSearchParams(window.location.search);
        const userGrade = urlParams.get('grade') || "9"; // Если класс не найден, ставим 9 по умолчанию

        const title = document.getElementById('grade-title');
        const qText = document.getElementById('question-text');
        const optContainer = document.getElementById('options-container');

        function loadQuiz() {
            const questions = allQuestions[userGrade] || allQuestions["9"];
            const currentQ = questions[0]; // Пока берем только первый вопрос для примера

            title.innerText = "Подготовка для " + userGrade + " класса";
            qText.innerText = currentQ.q;

            optContainer.innerHTML = "";
            currentQ.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.onclick = () => {
                    if (opt === currentQ.correct) {
                        alert("Правильно! 🎉");
                        tg.close();
                    } else {
                        alert("Ошибка, попробуй еще раз! ❌");
                    }
                };
                optContainer.appendChild(btn);
            });
        }

        loadQuiz();
    </script>
</body>
</html>
