<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Learning App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* --- БАЗОВЫЕ СТИЛИ --- */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; padding: 20px; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden; position: relative; transition: background 0.5s ease; color: #333;
        }

        #floating-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
        .floater { position: absolute; bottom: -150px; opacity: 0.6; animation: floatUp linear forwards; }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }

        .card { 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px);
            padding: 25px; border-radius: 24px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.15); 
            width: 100%; max-width: 450px; text-align: center; position: relative; z-index: 10; 
            display: none; /* Скрыты по умолчанию, включаются скриптом */
        }

        .active { display: block; animation: popIn 0.3s ease; }

        h2 { font-size: 1.3em; margin-bottom: 20px; color: #222; }
        
        button { 
            border: none; padding: 18px; border-radius: 16px; width: 100%; margin: 8px 0; 
            font-weight: 700; font-size: 16px; cursor: pointer; 
            background: #ffffff; color: #333; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: all 0.2s;
        }
        button:active { transform: scale(0.96); }

        /* Кнопки меню */
        .menu-btn-theory { background: linear-gradient(135deg, #17a2b8, #117a8b); color: white; }
        .menu-btn-practice { background: linear-gradient(135deg, #28a745, #218838); color: white; }

        /* Служебные кнопки */
        #next-btn { background: #007bff; color: white; display: none; }
        #back-to-menu { background: #6c757d; color: white; margin-top: 20px; }

        /* Стили ответа */
        .correct-anim { background: #d4edda !important; color: #155724 !important; border: 2px solid #28a745; }
        .wrong-anim { background: #f8d7da !important; color: #721c24 !important; border: 2px solid #dc3545; }

        /* Блок решения (появляется после ответа) */
        #solution-box { 
            margin-top: 15px; padding: 15px; border-radius: 12px; 
            background: #e9ecef; text-align: left; font-size: 14px; display: none;
        }

        /* Модальное окно */
        .modal {
            display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); align-items: center; justify-content: center;
        }
        .modal-content {
            background: white; padding: 25px; border-radius: 20px; width: 85%; max-width: 400px;
            text-align: left; animation: popIn 0.3s ease; max-height: 80vh; overflow-y: auto;
        }

        @keyframes popIn { from {transform: scale(0.8); opacity: 0;} to {transform: scale(1); opacity: 1;} }

        /* Фоны классов */
        body.grade-5, body.grade-6 { background: linear-gradient(135deg, #FF9A9E 0%, #FECFEF 100%); }
        body.grade-7, body.grade-8 { background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); }
        body.grade-9 { background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%); }
        body.grade-10, body.grade-11 { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
    </style>
</head>
<body>

    <div id="floating-container"></div>

    <div id="main-menu" class="card active">
        <h2 id="menu-title">Математика</h2>
        <p>Выбери режим обучения:</p>
        <button class="menu-btn-theory" onclick="showTheoryScreen()">📖 Изучить теорию</button>
        <button class="menu-btn-practice" onclick="startPractice()">📝 Перейти к практике</button>
    </div>

    <div id="theory-screen" class="card">
        <h2>📖 Теория по программе</h2>
        <div id="theory-content" style="text-align: left; font-size: 15px; line-height: 1.6; margin-bottom: 20px;">
            </div>
        <button id="back-to-menu" onclick="showMainMenu()">⬅️ В меню</button>
    </div>

    <div id="quiz-screen" class="card">
        <div id="quiz-progress" style="font-size: 12px; color: #666; margin-bottom: 10px;"></div>
        <h2 id="question-text">...</h2>
        
        <button id="help-btn" style="background: #17a2b8; color: white; padding: 10px; font-size: 14px;" onclick="showHelp()">💡 Вспомнить правило</button>
        
        <div id="options-container"></div>

        <div id="solution-box">
            <b style="color: #222;">🔬 Разбор:</b>
            <p id="solution-text"></p>
        </div>

        <button id="next-btn">Далее ➡️</button>
    </div>

    <div id="final-screen" class="card">
        <div style="font-size: 50px;">🏆</div>
        <h2>Результаты</h2>
        <p id="final-stat"></p>
        <button class="menu-btn-practice" onclick="showMainMenu()">В главное меню</button>
    </div>

    <div id="help-modal" class="modal">
        <div class="modal-content">
            <h3 id="help-title">💡 Правило</h3>
            <p id="help-text"></p>
            <button onclick="closeHelp()">Понятно</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // --- ДАННЫЕ (Структура для заполнения) ---
        const gradeData = {
            "5": {
                generalTheory: "В 5 классе мы изучаем натуральные числа, действия с ними и основы геометрии. Запомни: в выражениях со скобками они всегда решаются первыми!",
                questions: [
                    { 
                        q: "В одной книге 126 страниц, что в 3 раза больше, чем в другой. Сколько страниц во второй книге?", 
                        options: ["42", "378", "40"], 
                        correct: "42",
                        help: "Если одно число в несколько раз больше другого, то другое — во столько же раз меньше. Используй деление.",
                        solution: "Так как в первой книге страниц больше, во второй их меньше. 126 ÷ 3 = 42."
                    },
                    // Тут будут остальные 9 вопросов...
                ]
            },
            "7": {
                generalTheory: "Алгебра 7 класса — это формулы сокращенного умножения, степени и линейные уравнения. Это фундамент!",
                questions: [
                    {
                        q: "Представьте в виде многочлена: (x - 3)(x + 5)",
                        options: ["x² - 15", "x² - 2x - 15", "x² + 2x - 15", "x² + 8x - 15"],
                        correct: "x² + 2x - 15",
                        help: "Используй правило фонтанчика: умножь каждое слагаемое первой скобки на каждое слагаемое второй.",
                        solution: "(x - 3)(x + 5) = x*x + x*5 - 3*x - 3*5 = x² + 5x - 3x - 15 = x² + 2x - 15."
                    }
                ]
            }
            // И так далее для всех классов...
        };

        const stickers = ["https://cdn-icons-png.flaticon.com/512/2663/2663067.png", "https://cdn-icons-png.flaticon.com/512/3069/3069172.png"];
        
        const urlParams = new URLSearchParams(window.location.search);
        const grade = urlParams.get('grade') || "5";
        document.body.classList.add('grade-' + grade);
        document.getElementById('menu-title').innerText = grade + " класс: Математика";

        let currentQuestions = [];
        let currentIndex = 0;

        // --- НАВИГАЦИЯ ---
        function showMainMenu() {
            hideAll();
            document.getElementById('main-menu').classList.add('active');
        }

        function showTheoryScreen() {
            hideAll();
            const screen = document.getElementById('theory-screen');
            document.getElementById('theory-content').innerHTML = gradeData[grade]?.generalTheory || "Теория для этого класса скоро появится.";
            screen.classList.add('active');
        }

        function startPractice() {
            hideAll();
            currentIndex = 0;
            currentQuestions = [...(gradeData[grade]?.questions || gradeData["5"].questions)];
            // Перемешиваем вопросы
            currentQuestions.sort(() => Math.random() - 0.5);
            document.getElementById('quiz-screen').classList.add('active');
            renderQuestion();
        }

        function hideAll() {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        }

        // --- ЛОГИКА ТЕСТА ---
        function renderQuestion() {
            const q = currentQuestions[currentIndex];
            document.getElementById('quiz-progress').innerText = `Вопрос ${currentIndex + 1} из ${currentQuestions.length}`;
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('solution-box').style.display = "none";
            document.getElementById('next-btn').style.display = "none";
            
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(btn, opt, q.correct, q.solution);
                container.appendChild(btn);
            });
        }

        function checkAnswer(btn, selected, correct, solution) {
            const allBtns = document.getElementById('options-container').querySelectorAll('button');
            allBtns.forEach(b => b.disabled = true);

            if (selected === correct) {
                btn.classList.add('correct-anim');
            } else {
                btn.classList.add('wrong-anim');
                allBtns.forEach(b => {
                    if (b.innerText === correct) b.classList.add('correct-anim');
                });
            }

            // Показываем решение
            document.getElementById('solution-text').innerText = solution;
            document.getElementById('solution-box').style.display = "block";
            document.getElementById('next-btn').style.display = "block";
        }

        document.getElementById('next-btn').onclick = () => {
            currentIndex++;
            if (currentIndex < currentQuestions.length) {
                renderQuestion();
            } else {
                hideAll();
                document.getElementById('final-stat').innerText = "Тест пройден! Ты изучил разбор всех заданий.";
                document.getElementById('final-screen').classList.add('active');
            }
        };

        // --- МОДАЛКА ---
        function showHelp() {
            const q = currentQuestions[currentIndex];
            document.getElementById('help-text').innerHTML = q.help || "Вспомни базовые правила арифметики.";
            document.getElementById('help-modal').style.display = "flex";
        }
        function closeHelp() { document.getElementById('help-modal').style.display = "none"; }

        // Эффекты фона
        function spawn() {
            const container = document.getElementById('floating-container');
            const img = document.createElement('img');
            img.src = stickers[Math.floor(Math.random()*stickers.length)];
            img.className = 'floater';
            img.style.left = Math.random()*90 + 'vw';
            img.style.width = (30 + Math.random()*40) + 'px';
            img.style.animationDuration = (10 + Math.random()*10) + 's';
            container.appendChild(img);
            setTimeout(() => img.remove(), 20000);
        }
        setInterval(spawn, 2000);

        showMainMenu();
    </script>
</body>
</html>
