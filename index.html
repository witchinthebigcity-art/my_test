<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест к экзамену</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); padding: 20px; text-align: center; }
        .card { background: var(--tg-theme-secondary-bg-color); padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        button { background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="question">Сколько будет 2 + 2?</h2>
        <button onclick="checkAnswer(4)">4</button>
        <button onclick="checkAnswer(5)">5</button>
    </div>
    <p id="result"></p>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        function checkAnswer(ans) {
            const res = document.getElementById('result');
            if (ans === 4) {
                res.innerHTML = "✅ Правильно!";
                res.style.color = "green";
                // Отправляем данные обратно боту и закрываем окно через 2 секунды
                setTimeout(() => {
                    tg.sendData("Выполнил тест на отлично!");
                    tg.close();
                }, 2000);
            } else {
                res.innerHTML = "❌ Ошибка, попробуй еще раз.";
                res.style.color = "red";
            }
        }
    </script>
</body>
</html>
