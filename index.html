<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Universe: 5-6 классы</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* --- ГЛОБАЛЬНЫЕ СТИЛИ --- */
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 20px; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden; position: relative; transition: all 0.5s ease;
        }

        /* --- ТЕМА 5 КЛАССА --- */
        body.grade-5 {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F7FA 100%);
            --accent: #FF8C00; /* Оранжевый */
            --btn-ok: #32CD32; /* Лайм */
            --text-main: #003366;
        }

        /* --- ТЕМА 6 КЛАССА --- */
        body.grade-6 {
            font-family: 'Montserrat', sans-serif;
            background: #1A1A2E;
            background-image: radial-gradient(circle at 20% 30%, #2D142C 0%, transparent 40%),
                              radial-gradient(circle at 80% 70%, #16213E 0%, transparent 40%);
            --accent: #FF7F50; /* Коралловый */
            --btn-ok: #00CED1; /* Бирюзовый */
            --text-main: #E1E8F0;
        }

        /* --- ОБЩИЕ ЭЛЕМЕНТЫ ИНТЕРФЕЙСА --- */
        .card { 
            background: white; border-radius: 30px; padding: 25px;
            box-shadow: 0 10px 0 rgba(0,0,0,0.1); width: 100%; max-width: 420px;
            text-align: center; position: relative; z-index: 10; display: none;
            max-height: 85vh; overflow-y: auto; border: 4px solid #333;
        }
        body.grade-6 .card { background: rgba(26, 26, 46, 0.95); border-color: #00CED1; color: white; }
        body.grade-5 .card { color: #003366; }

        .active { display: block; animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        button { 
            border: none; padding: 18px; border-radius: 20px; width: 100%; margin: 8px 0;
            font-weight: 900; font-size: 18px; cursor: pointer; transition: 0.2s;
            box-shadow: 0 5px 0 rgba(0,0,0,0.2); font-family: inherit;
        }
        button:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }

        .btn-theory { background: var(--accent); color: white; }
        .btn-practice { background: var(--btn-ok); color: white; }
        .btn-block { background: #f0faff; color: #333; border: 2px solid #ddd; }
        body.grade-6 .btn-block { background: #252545; color: white; border-color: #00CED1; }

        .helper-icon { font-size: 65px; margin-bottom: 10px; }
        .theory-box { 
            text-align: left; padding: 15px; border-radius: 20px; 
            border: 3px dashed var(--accent); font-size: 16px; line-height: 1.5; margin-bottom: 10px;
        }

        #floating-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .floater { position: absolute; bottom: -100px; opacity: 0.4; animation: floatUp linear forwards; }
        @keyframes floatUp { from { transform: translateY(0); } to { transform: translateY(-120vh); } }

        #solution-box { 
            display: none; padding: 15px; border-radius: 20px; margin-top: 15px;
            text-align: left; border: 3px solid var(--btn-ok); font-size: 15px;
        }
    </style>
</head>
<body class="grade-5">

    <div id="floating-container"></div>

    <div id="main-menu" class="card active">
        <div id="menu-helper" class="helper-icon">🐱🚀</div>
        <h2 id="menu-title">Загрузка...</h2>
        <button class="btn-theory" onclick="showTheoryMenu()">📖 Секреты знаний</button>
        <button class="btn-practice" onclick="startPractice()">📝 Миссия: Практика</button>
    </div>

    <div id="theory-menu" class="card">
        <div id="theory-helper" class="helper-icon">🐶🔍</div>
        <h3>База данных:</h3>
        <div id="theory-btns-container"></div>
        <button onclick="showMainMenu()" style="background:#6c757d; color:white; font-size:14px;">⬅️ Назад</button>
    </div>

    <div id="theory-view" class="card">
        <h3 id="view-title" style="color: var(--accent);"></h3>
        <div id="view-content" class="theory-box"></div>
        <button class="btn-theory" onclick="showTheoryMenu()">💪 Усвоено!</button>
    </div>

    <div id="quiz-screen" class="card">
        <div id="q-progress" style="font-weight: 900; font-size: 14px; margin-bottom: 10px; opacity: 0.7;"></div>
        <h2 id="q-text" style="font-size: 18px; margin-bottom: 20px;"></h2>
        <div id="options-container"></div>
        <div id="solution-box">
            <b id="solution-hero">🤖 Анализ:</b><br>
            <span id="solution-text"></span>
        </div>
        <button id="next-btn" class="btn-practice" style="display:none; margin-top:15px;">Следующий этап ➡️</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const gradeData = {
            "5": {
                name: "5 класс",
                helper: "🐱🚀",
                helperName: "Кот-космонавт",
                theoryBlocks: [
                    { title: "🔢 Числа и нули", text: "<b>Свойства нуля:</b> Любое число + 0 остается собой. Любое число * 0 превращается в ноль. <br><br><b>Метод Гаусса:</b> Складывай крайние числа в парах, чтобы быстро найти сумму ряда!" },
                    { title: "📐 Геометрия", text: "<b>Периметр:</b> Длина забора вокруг фигуры. P = 2 * (a + b).<br><b>Площадь:</b> Сколько квадратов внутри. S = a * b." },
                    { title: "🍰 Дроби", text: "<b>Числитель (верх):</b> Сколько кусков съели. <b>Знаменатель (низ):</b> На сколько частей резали. Складываем только верх!" }
                ],
                questions: [
                    { q: "Ширина 8 см, длина на 4 см больше. Найди периметр.", options: ["40 см", "24 см", "20 см"], correct: "40 см", sol: "Длина = 12. P = (8+12)*2 = 40." },
                    { q: "Вычисли: 3,27 + 12,5", options: ["15,77", "15,32", "15,52"], correct: "15,77", sol: "Считаем запятую под запятой: 3,27 + 12,50 = 15,77." }
                ]
            },
            "6": {
                name: "6 класс",
                helper: "🤖🛰️",
                helperName: "Робот-аналитик",
                theoryBlocks: [
                    { title: "🔬 Теория чисел", text: "<b>НОК:</b> Наименьшее число, которое делится на оба заданных. <br><b>Разложение:</b> Представление числа в виде произведения простых 'цифровых ДНК'." },
                    { title: "⚖️ Пропорции", text: "<b>Главное правило:</b> Произведение крайних членов равно произведению средних. Если a/b = c/d, то a*d = b*c." },
                    { title: "🗺️ Масштаб и Координаты", text: "<b>Масштаб:</b> Показывает, во сколько раз реальность сжата на карте. <br><b>Координаты:</b> Точка A(x;y). Сначала идем по горизонтали (X), потом по вертикали (Y)." }
                ],
                questions: [
                    { q: "Найдите НОК чисел 12 и 15:", options: ["3", "180", "60", "30"], correct: "60", sol: "Число 60 делится и на 12 (5), и на 15 (4)." },
                    { q: "Решите пропорцию: 12 : x = 4 : 5", options: ["15", "9,6", "10", "2,4"], correct: "15", sol: "4x = 12 * 5 -> 4x = 60 -> x = 15." },
                    { q: "Карта 1:500 000. На карте 4 см. Реальное расстояние?", options: ["2 км", "20 км", "200 км", "12,5 км"], correct: "20 км", sol: "1 см = 5 км. 4 см * 5 = 20 км." },
                    { q: "Длина окружности (R=5, π≈3,14):", options: ["15,7 см", "31,4 см", "78,5 см", "314 см"], correct: "31,4 см", sol: "C = 2 * π * R = 2 * 3.14 * 5 = 31.4." },
                    { q: "Вычислите: -18 + (-7) - (-10)", options: ["-35", "-15", "-25", "15"], correct: "-15", sol: "-18 - 7 + 10 = -25 + 10 = -15." },
                    { q: "Значение: (-2,5) * (-4) * 0,3", options: ["3", "-3", "0,3", "-30"], correct: "3", sol: "(-2.5 * -4) = 10. 10 * 0.3 = 3." },
                    { q: "В какой четверти находится точка A(-5; 8)?", options: ["I", "II", "III", "IV"], correct: "II", sol: "X отрицательный, Y положительный — это вторая четверть." },
                    { q: "Упростите: 3(x - 2) - 2(x - 3)", options: ["x - 12", "5x", "x", "x + 12"], correct: "x", sol: "3x - 6 - 2x + 6 = x." },
                    { q: "Уравнение: 5x - 12 = 2x + 6", options: ["x=2", "x=6", "x=-2", "x=18"], correct: "x=6", sol: "3x = 18 -> x = 6." },
                    { q: "Значение |-12,4| + |3,6|:", options: ["8,8", "16", "-8,8", "-16"], correct: "16", sol: "12.4 + 3.6 = 16." }
                ]
            }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const grade = urlParams.get('grade') || "5";
        const currentData = gradeData[grade] || gradeData["5"];

        document.body.className = "grade-" + grade;
        document.getElementById('menu-title').innerText = currentData.name;
        document.getElementById('menu-helper').innerText = currentData.helper;

        function hideAll() { document.querySelectorAll('.card').forEach(c => c.classList.remove('active')); }
        function showMainMenu() { hideAll(); document.getElementById('main-menu').classList.add('active'); }

        function showTheoryMenu() {
            hideAll();
            document.getElementById('theory-helper').innerText = currentData.helper === "🐱🚀" ? "🐶🔍" : "🛸📡";
            const container = document.getElementById('theory-btns-container');
            container.innerHTML = "";
            currentData.theoryBlocks.forEach((b, i) => {
                const btn = document.createElement('button');
                btn.className = "btn-block";
                btn.innerText = b.title;
                btn.onclick = () => {
                    hideAll();
                    document.getElementById('view-title').innerText = b.title;
                    document.getElementById('view-content').innerHTML = b.text;
                    document.getElementById('theory-view').classList.add('active');
                };
                container.appendChild(btn);
            });
            document.getElementById('theory-menu').classList.add('active');
        }

        let curIdx = 0; let questions = [];
        function startPractice() {
            hideAll(); curIdx = 0;
            questions = [...currentData.questions].sort(() => Math.random() - 0.5);
            document.getElementById('quiz-screen').classList.add('active');
            renderQ();
        }

        function renderQ() {
            const q = questions[curIdx];
            document.getElementById('q-progress').innerText = `ЭТАП ${curIdx + 1} / ${questions.length}`;
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('solution-box').style.display = "none";
            document.getElementById('next-btn').style.display = "none";
            document.getElementById('solution-hero').innerText = currentData.helperName + " объясняет:";
            
            const cont = document.getElementById('options-container');
            cont.innerHTML = "";
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.onclick = () => {
                    const all = cont.querySelectorAll('button');
                    all.forEach(b => b.disabled = true);
                    if (opt === q.correct) {
                        btn.style.background = "#32CD32"; btn.style.color = "white";
                    } else {
                        btn.style.background = "#FF4500"; btn.style.color = "white";
                        all.forEach(b => { if(b.innerText === q.correct) b.style.background = "#32CD32"; b.style.color = "white"; });
                    }
                    document.getElementById('solution-text').innerText = q.sol;
                    document.getElementById('solution-box').style.display = "block";
                    document.getElementById('next-btn').style.display = "block";
                };
                cont.appendChild(btn);
            });
        }

        document.getElementById('next-btn').onclick = () => {
            curIdx++;
            if (curIdx < questions.length) renderQ();
            else showMainMenu();
        };

        function spawn() {
            const container = document.getElementById('floating-container');
            const item = document.createElement('div');
            item.className = 'floater';
            const icons = grade === "5" ? ["🐱","🚀","⭐","📐"] : ["🤖","🛸","👾","💠"];
            item.innerText = icons[Math.floor(Math.random()*icons.length)];
            item.style.left = Math.random() * 95 + 'vw';
            item.style.fontSize = (20 + Math.random() * 30) + 'px';
            item.style.animationDuration = (6 + Math.random() * 10) + 's';
            container.appendChild(item);
            setTimeout(() => item.remove(), 15000);
        }
        setInterval(spawn, 1500);

        showMainMenu();
    </script>
</body>
</html>
